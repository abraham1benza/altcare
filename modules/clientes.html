<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script type="module" src="../assets/js/firebase-init.js"></script>
<script src="../assets/js/module-init-v2.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
moduleInit('clientes').then(async (ok) => {
if (!ok) return;

const PAYMENT_TERMS = ['Contado', '7 días', '15 días', '30 días', '45 días', '60 días', '90 días'];
const TAXPAYER_TYPES = ['Contribuyente Ordinario', 'Contribuyente Formal', 'Contribuyente Especial', 'No Contribuyente', 'Persona Natural'];
const CUSTOMER_TYPES = ['Mayorista', 'Distribuidor', 'Salón de belleza', 'Tienda', 'Particular', 'Marca privada'];

let searchTerm = '';

function render() {
  let items = db.getAll(db.COLLECTIONS.customers);
  const allItems = items;

  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    items = items.filter(i =>
      (i.name||'').toLowerCase().includes(q) ||
      (i.rif||'').toLowerCase().includes(q) ||
      (i.contactName||'').toLowerCase().includes(q)
    );
  }

  const tableHtml = items.length
    ? `<table>
        <thead><tr>
          <th>Código</th>
          <th>Razón social</th>
          <th>RIF</th>
          <th>Tipo</th>
          <th>Contacto</th>
          <th>Términos</th>
          <th>Moneda</th>
          <th>Crédito</th>
          <th style="text-align:right;width:110px;">Acciones</th>
        </tr></thead>
        <tbody>
          ${items.map(r => `
            <tr>
              <td><span class="td-mono td-strong">${r.code || '—'}</span></td>
              <td>
                <div class="td-strong">${ui.escape(r.name)}</div>
                ${r.tradename ? `<div class="text-muted" style="font-size:11px;">${ui.escape(r.tradename)}</div>` : ''}
              </td>
              <td><span class="td-mono">${ui.escape(r.rif||'—')}</span></td>
              <td>${r.customerType ? `<span class="badge badge-plain">${ui.escape(r.customerType)}</span>` : '<span class="td-muted">—</span>'}</td>
              <td>
                ${r.contactName ? ui.escape(r.contactName) : '<span class="td-muted">—</span>'}
                ${r.phone ? `<div class="text-muted" style="font-size:11px;">${ui.escape(r.phone)}</div>` : ''}
              </td>
              <td>${r.paymentTerms ? `<span class="td-mono">${ui.escape(r.paymentTerms)}</span>` : '<span class="td-muted">—</span>'}</td>
              <td><span class="badge ${r.preferredCurrency==='USD'?'badge-accent':'badge-plain'}">${r.preferredCurrency || 'VES'}</span></td>
              <td>${r.creditLimit ? `<span class="td-mono">${currency.formatCompact(r.creditLimit, r.preferredCurrency || 'VES')}</span>` : '<span class="td-muted">—</span>'}</td>
              <td class="td-actions">
                <button class="btn-icon" onclick="editItem('${r.id}')" title="Editar">${ui.icon('edit')}</button>
                <button class="btn-icon" onclick="deleteItem('${r.id}')" title="Eliminar">${ui.icon('trash')}</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`
    : (allItems.length === 0
      ? `<div class="empty-state">
          <div class="empty-state-icon">${ui.icon('users')}</div>
          <div class="empty-state-title">Sin clientes</div>
          <div class="empty-state-text">Registra a tus clientes para emitir facturas, gestionar pedidos y dar seguimiento a cuentas por cobrar.</div>
          <button class="btn btn-primary" onclick="newItem()">${ui.icon('plus')} Crear el primero</button>
        </div>`
      : `<div class="empty-state"><div class="empty-state-title">Sin resultados</div><div class="empty-state-text">Ningún cliente coincide con tu búsqueda.</div></div>`);

  const content = `
    <div class="action-bar">
      <div class="action-bar-left">
        <h2 class="action-bar-title">Clientes</h2>
        <span class="action-bar-count">${allItems.length} registrados</span>
      </div>
      <div class="action-bar-right">
        <button class="btn btn-primary" onclick="newItem()">${ui.icon('plus')} Nuevo cliente</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-toolbar">
        <div class="search-box">
          ${ui.icon('search')}
          <input class="input" type="search" placeholder="Buscar por nombre, RIF o contacto..." value="${ui.escape(searchTerm)}" oninput="onSearch(this.value)">
        </div>
      </div>
      ${tableHtml}
    </div>
  `;

  ui.renderLayout({
    activeModule: 'clientes',
    pageEyebrow: 'Comercial',
    pageTitle: 'Clientes',
    contentHtml: content
  });
}

function onSearch(v) { searchTerm = v; render(); }

function newItem() {
  const code = db.nextCode(db.COLLECTIONS.customers, 'CLI');
  openForm({ code, paymentTerms: 'Contado', preferredCurrency: 'VES', taxpayerType: 'Contribuyente Ordinario', creditLimit: 0 });
}

function editItem(id) {
  const r = db.getById(db.COLLECTIONS.customers, id);
  if (r) openForm(r);
}

function openForm(item) {
  const isNew = !item.id;
  ui.openModal({
    size: 'lg',
    title: isNew ? 'Nuevo cliente' : 'Editar cliente',
    subtitle: isNew ? `Código asignado: ${item.code}` : `Código: ${item.code}`,
    body: `
      <form id="cli-form" onsubmit="saveItem(event, '${item.id || ''}')">
        <input type="hidden" name="code" value="${item.code}">

        <div class="section-title">Datos fiscales</div>
        <div class="form-grid form-grid-2 mb-24">
          <div class="field">
            <label class="field-label">Razón social / Nombre *</label>
            <input class="input" name="name" required value="${ui.escape(item.name||'')}">
          </div>
          <div class="field">
            <label class="field-label">Nombre comercial</label>
            <input class="input" name="tradename" value="${ui.escape(item.tradename||'')}">
          </div>
          <div class="field">
            <label class="field-label">RIF / Cédula *</label>
            <input class="input" name="rif" required value="${ui.escape(item.rif||'')}" placeholder="J-12345678-9 o V-12345678">
          </div>
          <div class="field">
            <label class="field-label">Tipo de contribuyente</label>
            <select class="select" name="taxpayerType">
              ${TAXPAYER_TYPES.map(t => `<option ${t===item.taxpayerType?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field" style="grid-column:1 / -1;">
            <label class="field-label">Dirección fiscal</label>
            <input class="input" name="address" value="${ui.escape(item.address||'')}">
          </div>
          <div class="field" style="grid-column:1 / -1;">
            <label class="field-label">Dirección de envío (si difiere)</label>
            <input class="input" name="shippingAddress" value="${ui.escape(item.shippingAddress||'')}">
          </div>
        </div>

        <div class="section-title">Contacto</div>
        <div class="form-grid form-grid-2 mb-24">
          <div class="field">
            <label class="field-label">Persona de contacto</label>
            <input class="input" name="contactName" value="${ui.escape(item.contactName||'')}">
          </div>
          <div class="field">
            <label class="field-label">Cargo</label>
            <input class="input" name="contactRole" value="${ui.escape(item.contactRole||'')}">
          </div>
          <div class="field">
            <label class="field-label">Teléfono</label>
            <input class="input" name="phone" value="${ui.escape(item.phone||'')}">
          </div>
          <div class="field">
            <label class="field-label">WhatsApp</label>
            <input class="input" name="whatsapp" value="${ui.escape(item.whatsapp||'')}" placeholder="Si es distinto al teléfono">
            <div class="field-hint">Para enviar notificaciones. Si vacío, se usa el teléfono.</div>
          </div>
          <div class="field">
            <label class="field-label">Email</label>
            <input class="input" type="email" name="email" value="${ui.escape(item.email||'')}">
          </div>
        </div>

        <div class="section-title">Comercial</div>
        <div class="form-grid form-grid-3 mb-24">
          <div class="field">
            <label class="field-label">Tipo de cliente</label>
            <select class="select" name="customerType">
              <option value="">—</option>
              ${CUSTOMER_TYPES.map(t => `<option ${t===item.customerType?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label class="field-label">Términos de pago</label>
            <select class="select" name="paymentTerms">
              ${PAYMENT_TERMS.map(t => `<option ${t===item.paymentTerms?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label class="field-label">Moneda preferida</label>
            <select class="select" name="preferredCurrency">
              <option value="VES" ${item.preferredCurrency==='VES'?'selected':''}>Bolívares (VES)</option>
              <option value="USD" ${item.preferredCurrency==='USD'?'selected':''}>Dólares (USD)</option>
              <option value="EUR" ${item.preferredCurrency==='EUR'?'selected':''}>Euros (EUR)</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label">Límite de crédito</label>
            <input class="input" type="number" step="0.01" name="creditLimit" value="${item.creditLimit||0}">
            <div class="field-hint">En la moneda preferida. 0 = sin crédito</div>
          </div>
          <div class="field">
            <label class="field-label">Descuento habitual (%)</label>
            <input class="input" type="number" step="0.01" name="defaultDiscount" value="${item.defaultDiscount||0}">
          </div>
          <div class="field">
            <label class="field-label">Vendedor asignado</label>
            <input class="input" name="salesRep" value="${ui.escape(item.salesRep||'')}">
          </div>
        </div>

        <div class="section-title">Notas</div>
        <div class="field">
          <textarea class="textarea" name="notes" placeholder="Observaciones, preferencias, historial...">${ui.escape(item.notes||'')}</textarea>
        </div>
      </form>
    `,
    footer: `
      <button class="btn btn-secondary" onclick="ui.closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="document.getElementById('cli-form').requestSubmit()">${ui.icon('check')} Guardar</button>
    `
  });
}

function saveItem(e, id) {
  e.preventDefault();
  const data = ui.formData(e.target);
  if (!data.name || !data.rif) { ui.toast('Razón social y RIF/Cédula son obligatorios', 'error'); return; }
  if (id) data.id = id;
  db.save(db.COLLECTIONS.customers, data);
  ui.closeModal();
  ui.toast(id ? 'Cliente actualizado' : 'Cliente creado', 'success');
  render();
}

function deleteItem(id) {
  const r = db.getById(db.COLLECTIONS.customers, id);
  ui.confirm(
    `¿Eliminar al cliente "${r.name}"?`,
    () => {
      db.remove(db.COLLECTIONS.customers, id);
      ui.toast('Cliente eliminado', 'success');
      render();
    },
    { danger: true, confirmLabel: 'Eliminar' }
  );
}

render();


// Exponer funciones a window (para que onclick="" del HTML pueda llamarlas)
Object.assign(window, {
  render: typeof render !== 'undefined' ? render : undefined,
  onSearch: typeof onSearch !== 'undefined' ? onSearch : undefined,
  newItem: typeof newItem !== 'undefined' ? newItem : undefined,
  editItem: typeof editItem !== 'undefined' ? editItem : undefined,
  openForm: typeof openForm !== 'undefined' ? openForm : undefined,
  saveItem: typeof saveItem !== 'undefined' ? saveItem : undefined,
  deleteItem: typeof deleteItem !== 'undefined' ? deleteItem : undefined,
});
});
</script>
</body>
</html>
