<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script type="module" src="../assets/js/firebase-init.js"></script>
<script src="../assets/js/module-init-v2.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/inventory.js"></script>
<script src="../assets/js/formulas.js"></script>
<script src="../assets/js/purchases.js"></script>
<script src="../assets/js/sales.js"></script>
<script src="../assets/js/payments.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
moduleInit('ventas').then(async (ok) => {
if (!ok) return;

let view = 'list';        // list | detail | create | assignLots
let selectedId = null;
let creating = null;
let assigning = null;
let typeFilter = '';
let searchTerm = '';

// Aplicar filtro inicial desde URL (?filter=PEDIDO viene del dashboard)
(function applyUrlFilter() {
  const params = new URLSearchParams(window.location.search);
  const filterParam = params.get('filter');
  if (filterParam && ['PEDIDO','COTIZACION','NOTA_ENTREGA','FACTURA','PAID','PARTIAL','CANCELLED'].includes(filterParam)) {
    typeFilter = filterParam;
    window.history.replaceState({}, '', window.location.pathname);
  }
})();

function render() {
  if (view === 'detail' && selectedId) return renderDetail();
  if (view === 'create') return renderCreate();
  if (view === 'assignLots') return renderAssignLots();
  return renderList();
}

// ====== LISTA ======

function renderList() {
  let docs = db.getAll(db.COLLECTIONS.salesOrders).filter(d => !d.cancelled || typeFilter === 'CANCELLED');
  const all = docs;
  if (typeFilter) docs = docs.filter(d => d.type === typeFilter || d.status === typeFilter);
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    docs = docs.filter(d => (d.code||'').toLowerCase().includes(q) || (d.invoiceNumber||'').toLowerCase().includes(q) || (d.customerName||'').toLowerCase().includes(q));
  }
  docs.sort((a,b) => (b.issueDate||'').localeCompare(a.issueDate||''));

  // Stats
  const counts = {
    pedidos: all.filter(d => d.type === 'PEDIDO').length,
    cotizaciones: all.filter(d => d.type === 'COTIZACION').length,
    facturas: all.filter(d => d.type === 'FACTURA').length
  };

  // Total facturado por moneda
  const billedByCcy = { VES: 0, USD: 0, EUR: 0 };
  all.filter(d => d.type === 'FACTURA' && !d.cancelled).forEach(d => {
    billedByCcy[d.currency] = (billedByCcy[d.currency] || 0) + d.total;
  });
  const fmtMulti = (byCcy) => {
    const parts = [];
    if (byCcy.VES > 0.01) parts.push(currency.format(byCcy.VES, 'VES'));
    if (byCcy.USD > 0.01) parts.push(currency.format(byCcy.USD, 'USD'));
    if (byCcy.EUR > 0.01) parts.push(currency.format(byCcy.EUR, 'EUR'));
    return parts.length ? parts : ['0,00'];
  };
  const billedParts = fmtMulti(billedByCcy);

  const isGerencial = (typeof auth !== 'undefined' && auth.getActiveMode() === 'gerencial');

  const tableHtml = docs.length ? `<table>
    <thead><tr>
      <th>Código</th>
      <th>N° Factura</th>
      <th>Cliente</th>
      <th>Fecha</th>
      <th>Vence</th>
      <th style="text-align:right;">Total ${isGerencial ? 'USD' : 'Bs'}</th>
      ${isGerencial ? `<th style="text-align:right;">Total Bs</th>` : ''}
      <th>Tipo</th>
      <th>Estado</th>
      <th style="text-align:right;width:100px;">Acciones</th>
    </tr></thead>
    <tbody>${docs.map(d => {
      const today = new Date().toISOString().slice(0,10);
      const overdue = d.dueDate && d.dueDate < today && d.status !== 'PAID' && d.type === 'FACTURA';
      const tBadge = sales.STATUS[d.type]?.color || 'badge-plain';
      const sBadge = sales.STATUS[d.status]?.color || 'badge-plain';

      // Calcular USD y VES
      const isFrozen = !!d.rateAtFullPayment;
      let usdValue, vesValue;
      if (isFrozen) {
        usdValue = d.totalUSD_atFullPayment || 0;
        vesValue = d.totalVES_atFullPayment || 0;
      } else {
        const convVES = currency.toFiscal(d.total, d.currency, 'VES');
        const convUSD = currency.toFiscal(d.total, d.currency, 'USD');
        usdValue = d.currency === 'USD' ? d.total : convUSD.value;
        vesValue = d.currency === 'VES' ? d.total : convVES.value;
      }
      const lockIcon = isFrozen ? '<span title="Tasa congelada al pagar" style="opacity:0.6;font-size:10px;">🔒</span>' : '';

      return `<tr style="cursor:pointer;${d.cancelled?'opacity:0.5;':''}" onclick="openDetail('${d.id}')">
        <td><span class="td-mono td-strong">${d.code}</span></td>
        <td>${d.invoiceNumber ? `<span class="td-mono">${d.invoiceNumber}</span><div class="text-muted" style="font-size:11px;">Ctrl: ${d.controlNumber||'—'}</div>` : '<span class="td-muted">—</span>'}</td>
        <td><div class="td-strong">${ui.escape(d.customerName)}</div><div class="text-muted" style="font-size:11px;">${ui.escape(d.customerRif||'')}</div></td>
        <td><span class="text-muted">${ui.formatDate(d.issueDate)}</span></td>
        <td>${d.dueDate ? `<span class="${overdue?'badge badge-danger':'text-muted'}">${ui.formatDate(d.dueDate)}</span>` : '<span class="td-muted">—</span>'}</td>
        <td style="text-align:right;">
          <span class="td-mono td-strong">${currency.format(isGerencial ? usdValue : vesValue, isGerencial ? 'USD' : 'VES')}</span>
          ${lockIcon}
        </td>
        ${isGerencial ? `<td style="text-align:right;"><span class="td-mono text-muted" style="font-size:12px;">${currency.format(vesValue, 'VES')}</span></td>` : ''}
        <td><span class="badge ${tBadge}">${d.type}</span></td>
        <td>${d.cancelled ? '<span class="badge badge-cancelled">Anulada</span>' : `<span class="badge ${sBadge}">${sales.STATUS[d.status]?.label || d.status}</span>`}</td>
        <td class="td-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openDetail('${d.id}')">${ui.icon('edit')}</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table>` : (all.length === 0 ?
      `<div class="empty-state"><div class="empty-state-icon">${ui.icon('flask')}</div><div class="empty-state-title">Sin documentos de venta</div><div class="empty-state-text">Crea tu primer pedido. Después podrás convertirlo en cotización o factura.</div></div>`
      : '<div class="empty-state"><div class="empty-state-title">Sin resultados</div></div>');

  ui.renderLayout({
    activeModule: 'ventas', pageEyebrow: 'Comercial', pageTitle: 'Ventas',
    contentHtml: `
      <div class="action-bar">
        <div class="action-bar-left">
          <h2 class="action-bar-title">Ventas</h2>
          <span class="action-bar-count">${all.length} documentos · ${counts.pedidos} pedidos · ${counts.cotizaciones} cotizaciones · ${counts.facturas} facturas</span>
        </div>
      </div>

      <div class="grid grid-4 mb-24">
        <div class="kpi"><div class="kpi-label">Pedidos abiertos</div><div class="kpi-value">${all.filter(d=>d.type==='PEDIDO'&&!d.cancelled).length}</div><div class="kpi-value-sub">en gestión</div></div>
        <div class="kpi"><div class="kpi-label">Cotizaciones</div><div class="kpi-value">${all.filter(d=>d.type==='COTIZACION'&&!d.cancelled).length}</div><div class="kpi-value-sub">enviadas</div></div>
        <div class="kpi"><div class="kpi-label">Facturas</div><div class="kpi-value">${all.filter(d=>d.type==='FACTURA'&&!d.cancelled).length}</div><div class="kpi-value-sub">emitidas</div></div>
        <div class="kpi">
          <div class="kpi-label">Total facturado</div>
          ${billedParts.length === 1
            ? `<div class="kpi-value" style="color:var(--accent-ink);font-size:22px;">${billedParts[0]}</div>`
            : `<div style="display:flex;flex-direction:column;gap:2px;margin-top:4px;">${billedParts.map(p => `<div style="font-family:var(--font-display);font-size:16px;letter-spacing:-0.02em;color:var(--accent-ink);line-height:1.2;">${p}</div>`).join('')}</div>`}
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-toolbar">
          <div class="search-box">${ui.icon('search')}<input class="input" type="search" placeholder="Buscar por código, factura o cliente..." value="${ui.escape(searchTerm)}" oninput="onSearch(this.value)"></div>
          <select class="select" style="max-width:200px;" onchange="onTypeFilter(this.value)">
            <option value="">Todos los tipos</option>
            <option value="PEDIDO" ${typeFilter==='PEDIDO'?'selected':''}>Pedidos</option>
            <option value="COTIZACION" ${typeFilter==='COTIZACION'?'selected':''}>Cotizaciones</option>
            <option value="NOTA_ENTREGA" ${typeFilter==='NOTA_ENTREGA'?'selected':''}>Notas de Entrega</option>
            <option value="FACTURA" ${typeFilter==='FACTURA'?'selected':''}>Facturas</option>
            <option value="PAID" ${typeFilter==='PAID'?'selected':''}>Pagadas</option>
            <option value="PARTIAL" ${typeFilter==='PARTIAL'?'selected':''}>Pago parcial</option>
            <option value="CANCELLED" ${typeFilter==='CANCELLED'?'selected':''}>Anuladas</option>
          </select>
        </div>
        ${tableHtml}
      </div>

      <!-- Cuadro: Cuentas por cobrar -->
      ${renderCuentasPorCobrar(all)}

      <div style="display:flex;justify-content:flex-end;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="newDoc('NOTA_ENTREGA')" title="Sin IVA, no entra en libros fiscales">${ui.icon('file')} Nueva Nota de Entrega</button>
        <button class="btn btn-primary" onclick="newDoc('PEDIDO')">${ui.icon('plus')} Nuevo Pedido</button>
      </div>
    `
  });
}

/** Cuadro de Cuentas por Cobrar: facturas con saldo pendiente, ordenadas por vencimiento */
function renderCuentasPorCobrar(allDocs) {
  const today = new Date().toISOString().slice(0,10);
  const pending = allDocs
    .filter(d => d.type === 'FACTURA' && !d.cancelled)
    .filter(d => (d.total - (d.paidAmount||0)) > 0.01)
    .sort((a, b) => {
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return a.dueDate.localeCompare(b.dueDate);
    });

  if (!pending.length) {
    return `<div class="card mb-24" style="margin-top:32px;padding:0;">
      <div style="padding:18px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg, var(--accent-soft) 0%, transparent 100%);">
        <div class="card-title" style="display:flex;align-items:center;gap:8px;">💰 Cuentas por cobrar</div>
      </div>
      <div style="padding:32px;text-align:center;color:var(--ink-3);">
        ✓ No tenés facturas pendientes de cobro
      </div>
    </div>`;
  }

  // Total por cobrar en USD
  const totalUSD = pending.reduce((s, d) => {
    const remaining = d.total - (d.paidAmount||0);
    if (d.currency === 'USD') return s + remaining;
    if (d.currency === 'VES') {
      const r = currency.getRate('BCV_USD');
      return s + (r?.value ? remaining / r.value : 0);
    }
    return s + remaining;
  }, 0);

  return `<div class="card mb-24" style="margin-top:32px;padding:0;">
    <div style="padding:18px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg, #d1fae5 0%, transparent 100%);display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div class="card-title" style="display:flex;align-items:center;gap:8px;">💰 Cuentas por cobrar</div>
        <div class="text-muted" style="font-size:11px;margin-top:2px;">${pending.length} factura${pending.length!==1?'s':''} con saldo pendiente · Total: ${currency.format(totalUSD, 'USD')} aprox.</div>
      </div>
    </div>
    <div class="table-wrap" style="border-radius:0;">
      <table>
        <thead><tr><th>Factura</th><th>Cliente</th><th>Emitida</th><th>Vence</th><th style="text-align:right;">Total</th><th style="text-align:right;">Cobrado</th><th style="text-align:right;">Pendiente</th><th>Estado</th><th style="text-align:right;width:280px;">Acciones</th></tr></thead>
        <tbody>${pending.map(d => {
          const remaining = d.total - (d.paidAmount||0);
          const overdue = d.dueDate && d.dueDate < today;
          const customer = db.getById(db.COLLECTIONS.customers, d.customerId);
          const hasPhone = customer && (customer.whatsapp || customer.phone);
          const notifyUrl = hasPhone
            ? `notificaciones.html?quickSend=1&type=customer&id=${d.customerId}&template=COBRO_PENDIENTE_CLIENTE&docId=${d.id}`
            : `clientes.html`;
          const btnTitle = hasPhone ? 'Avisar al cliente por WhatsApp' : 'Sin WhatsApp · click para agregarlo';
          const s = sales.STATUS[d.status] || { label: d.status, color: 'badge-plain' };

          return `<tr ${overdue?'style="background:#fef2f2;"':''}>
            <td>
              <span class="td-mono td-strong">${d.invoiceNumber||d.code}</span>
              ${d.controlNumber ? `<div class="text-muted" style="font-size:11px;">Ctrl: ${d.controlNumber}</div>` : ''}
            </td>
            <td>${ui.escape(d.customerName)}</td>
            <td><span class="text-muted" style="font-size:12px;">${ui.formatDate(d.issueDate)}</span></td>
            <td>
              ${d.dueDate
                ? `<span class="badge ${overdue?'badge-overdue':'badge-plain'}" style="font-size:10px;">${ui.formatDate(d.dueDate)}</span>`
                : '<span class="text-muted">—</span>'}
            </td>
            <td style="text-align:right;"><span class="td-mono">${currency.format(d.total, d.currency)}</span></td>
            <td style="text-align:right;"><span class="td-mono text-muted">${currency.format(d.paidAmount||0, d.currency)}</span></td>
            <td style="text-align:right;"><span class="td-mono td-strong" style="${overdue?'color:var(--danger);':''}">${currency.format(remaining, d.currency)}</span></td>
            <td><span class="badge ${s.color}" style="font-size:10px;">${s.label}</span></td>
            <td>
              <div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;">
                <button class="btn btn-ghost btn-sm" onclick="openDetail('${d.id}')" title="Ver detalle" style="font-size:11px;padding:4px 8px;">${ui.icon('eye')||'👁'} Ver</button>
                <a href="pagos.html?doc=${d.id}" class="btn btn-secondary btn-sm" title="Registrar cobro" style="font-size:11px;padding:4px 8px;text-decoration:none;">$ Cobrar</a>
                <a href="${notifyUrl}" class="btn ${hasPhone?'btn-secondary':'btn-ghost'} btn-sm" title="${btnTitle}" style="font-size:11px;padding:4px 8px;${!hasPhone?'opacity:0.5;':''}">📱 Avisar</a>
              </div>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

const _doSearchRender = ui.debounce(() => render(), 250);
function onSearch(v) { searchTerm = v; _doSearchRender(); }
function onTypeFilter(v) { typeFilter = v; render(); }

// ====== CREAR ======

function newDoc(initialType) {
  const customers = db.getAll(db.COLLECTIONS.customers);
  if (!customers.length) { ui.toast('Primero crea un cliente', 'error'); return; }
  const formulas = db.getAll(db.COLLECTIONS.formulas);
  const fgLots = db.getAll(db.COLLECTIONS.finishedGoods).filter(l => l.status === 'LIBERADO' && l.balance > 0);
  if (!formulas.length && !fgLots.length) {
    ui.toast('Necesitas fórmulas o lotes de PT liberados para vender', 'error', 4000);
    return;
  }

  const cfg = db.getById(db.COLLECTIONS.config, 'main') || {};
  const docType = initialType || 'PEDIDO';
  const codePrefix = docType === 'NOTA_ENTREGA' ? 'NE' : 'V';
  creating = {
    type: docType,
    code: db.nextCode(db.COLLECTIONS.salesOrders, codePrefix),
    customerId: '', customerName: '',
    currency: 'VES',
    rateType: cfg.defaultRateType || 'BCV_USD',
    issueDate: new Date().toISOString().slice(0,10),
    dueDate: '',
    paymentTerms: cfg.invoicePaymentTermsDefault || 'Contado',
    items: [],
    notes: ''
  };
  view = 'create'; render();
}

function renderCreate() {
  const c = creating;
  const customers = db.getAll(db.COLLECTIONS.customers);
  const formulas = db.getAll(db.COLLECTIONS.formulas);

  // Cálculos
  const cfg = db.getById(db.COLLECTIONS.config, 'main') || {};
  const ivaRate = cfg.ivaRate || 16;
  const subtotal = c.items.reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0) * (1 - (parseFloat(it.discount)||0)/100)), 0);
  const taxableBase = c.items.filter(it => !it.exempt).reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0) * (1 - (parseFloat(it.discount)||0)/100)), 0);
  const ivaAmount = taxableBase * ivaRate / 100;
  const total = subtotal + ivaAmount;

  const itemsHtml = `<div class="card mb-24" style="padding:0;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <div class="card-title" style="font-size:15px;">Ítems</div>
      <button class="btn btn-secondary btn-sm" onclick="addItem()">${ui.icon('plus')} Agregar producto</button>
    </div>
    ${c.items.length ? `<table>
      <thead><tr>
        <th style="width:30%;">Producto</th>
        <th style="text-align:right;">Cantidad</th>
        <th>Unidad</th>
        <th style="text-align:right;">Precio unit.</th>
        <th style="text-align:right;">Desc %</th>
        <th style="text-align:center;">Exento</th>
        <th style="text-align:right;">Subtotal</th>
        <th style="width:40px;"></th>
      </tr></thead>
      <tbody>${c.items.map((it, idx) => `<tr>
        <td>
          <select class="select" onchange="updateItemFormula(${idx}, this.value)">
            <option value="">— Selecciona producto —</option>
            ${formulas.map(f => `<option value="${f.id}" ${f.id===it.formulaId?'selected':''}>${ui.escape(f.code)} · ${ui.escape(f.name)}</option>`).join('')}
          </select>
        </td>
        <td style="text-align:right;"><input class="input" type="number" step="0.001" value="${it.quantity||''}" style="text-align:right;font-family:var(--font-mono);" oninput="updateItemFast(${idx},'quantity',this.value)"></td>
        <td><span class="text-muted" id="ven-unit-${idx}">${it.unit||'—'}</span></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.0001" value="${it.unitPrice||''}" style="text-align:right;font-family:var(--font-mono);" oninput="updateItemFast(${idx},'unitPrice',this.value)"></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.01" value="${it.discount||0}" style="text-align:right;font-family:var(--font-mono);width:80px;" oninput="updateItemFast(${idx},'discount',this.value)"></td>
        <td style="text-align:center;"><input type="checkbox" ${it.exempt?'checked':''} onchange="updateItemExempt(${idx}, this.checked)"></td>
        <td style="text-align:right;"><span class="td-mono td-strong" id="ven-line-${idx}">${currency.format((it.quantity||0)*(it.unitPrice||0)*(1-(it.discount||0)/100), c.currency)}</span></td>
        <td><button class="btn-icon" onclick="removeItem(${idx})">${ui.icon('trash')}</button></td>
      </tr>`).join('')}</tbody>
    </table>` : '<div style="padding:32px;text-align:center;color:var(--ink-3);">Sin productos. Agregá al menos uno.</div>'}
  </div>`;

  // Disponibilidad de cada producto
  const stockInfoHtml = c.items.length && c.items.some(it => it.formulaId) ? `<div class="card mb-24" style="padding:14px 18px;background:#eff6ff;border-color:#bfdbfe;">
    <div style="font-size:12.5px;color:#1e3a8a;line-height:1.6;">
      <strong>📦 Stock disponible (Producto Terminado liberado):</strong>
      <div style="margin-top:6px;">${c.items.filter(it => it.formulaId).map(it => {
        const f = db.getById(db.COLLECTIONS.formulas, it.formulaId);
        const lots = db.query(db.COLLECTIONS.finishedGoods, l => l.formulaId === it.formulaId && l.status === 'LIBERADO' && (l.balance - (l.reserved||0)) > 0);
        const totalAvail = lots.reduce((s,l) => s + (l.balance - (l.reserved||0)), 0);
        const enough = totalAvail >= it.quantity;
        return `<div style="${!enough?'color:var(--danger);':''}">${ui.escape(f?.name||'')}: ${totalAvail.toFixed(3)} ${lots[0]?.unit||''} disponible${enough?' ✓':` (faltan ${(it.quantity - totalAvail).toFixed(3)})`}</div>`;
      }).join('')}</div>
    </div>
  </div>` : '';

  ui.renderLayout({
    activeModule: 'ventas', pageEyebrow: 'Nuevo pedido', pageTitle: c.code,
    contentHtml: `
      <div class="card mb-24">
        <div class="card-header"><div class="card-title">Información</div></div>
        <div class="form-grid form-grid-2">
          <div class="field"><label class="field-label">Código</label><input class="input" value="${c.code}" disabled style="font-family:var(--font-mono);"></div>
          <div class="field"><label class="field-label">Cliente *</label><select class="select" onchange="onCustomerChange(this.value)">
            <option value="">— Selecciona —</option>
            ${customers.map(cu => `<option value="${cu.id}" ${cu.id===c.customerId?'selected':''}>${ui.escape(cu.name)} · ${ui.escape(cu.rif||'')}</option>`).join('')}
          </select></div>
          <div class="field"><label class="field-label">Fecha emisión</label><input class="input" type="date" value="${c.issueDate}" onchange="creating.issueDate=this.value"></div>
          <div class="field"><label class="field-label">Vencimiento</label><input class="input" type="date" value="${c.dueDate||''}" onchange="creating.dueDate=this.value"></div>
          <div class="field"><label class="field-label">Términos de pago</label><select class="select" onchange="creating.paymentTerms=this.value">
            ${['Contado','7 días','15 días','30 días','45 días','60 días','90 días'].map(t => `<option ${t===c.paymentTerms?'selected':''}>${t}</option>`).join('')}
          </select></div>
          <div class="field"><label class="field-label">Moneda</label><select class="select" onchange="creating.currency=this.value;render()">
            <option value="VES" ${c.currency==='VES'?'selected':''}>Bolívares (VES)</option>
            <option value="USD" ${c.currency==='USD'?'selected':''}>Dólares (USD)</option>
            <option value="EUR" ${c.currency==='EUR'?'selected':''}>Euros (EUR)</option>
          </select></div>
          ${c.currency !== 'VES' ? `<div class="field" style="grid-column:1/-1;"><label class="field-label">Tasa para conversión a Bs (libro de ventas)</label><select class="select" onchange="creating.rateType=this.value">${currency.getRates().map(r => `<option value="${r.type}" ${r.type===c.rateType?'selected':''}>${r.label} (${r.value.toFixed(2)})</option>`).join('')}</select><div class="field-hint">SENIAT exige reportar todo en Bs aunque factures en USD</div></div>` : ''}
        </div>
      </div>

      ${itemsHtml}

      ${stockInfoHtml}

      <!-- Resumen -->
      <div class="card mb-24" style="padding:0;" id="ven-summary-card">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);"><div class="card-title" style="font-size:15px;">Resumen</div></div>
        <div style="padding:0 20px;" id="ven-summary-body">
          ${renderVenSummary(subtotal, ivaAmount, total, ivaRate, c)}
        </div>
      </div>

      <div class="card mb-24">
        <div class="card-header"><div class="card-title">Notas</div></div>
        <textarea class="textarea" onchange="creating.notes=this.value">${ui.escape(c.notes||'')}</textarea>
      </div>

      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="cancelCreate()">← Cancelar</button>
        <button class="btn btn-primary" onclick="saveDoc()">${ui.icon('check')} Crear pedido</button>
      </div>
      <div style="height:40px;"></div>
    `
  });
}

function renderVenSummary(subtotal, ivaAmount, total, ivaRate, c) {
  const exemptTotal = c.items.filter(it => it.exempt).reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0) * (1 - (parseFloat(it.discount)||0)/100)), 0);
  return [
    ['Subtotal', currency.format(subtotal, c.currency), false],
    ...(exemptTotal > 0 ? [[`Exento de IVA`, currency.format(exemptTotal, c.currency), false]] : []),
    [`IVA ${ivaRate}%`, currency.format(ivaAmount, c.currency), false],
    ['Total', currency.format(total, c.currency), true, true]
  ].map(([label, val, strong, accent]) => `
    <div class="list-row" style="grid-template-columns:1fr auto;border:none;padding:10px 0;${accent?'border-top:1px solid var(--border);background:var(--accent-soft);margin:0 -20px;padding:14px 20px;':''}">
      <span style="font-size:13px;${strong?'font-weight:600;':''}${accent?'color:var(--accent-ink);font-weight:600;':''}">${label}</span>
      <span class="${strong?'td-mono td-strong':'td-mono'}" style="font-size:14px;${accent?'color:var(--accent-ink);font-size:18px;font-family:var(--font-display);font-style:italic;':''}">${val}</span>
    </div>
  `).join('');
}

function onCustomerChange(cid) {
  creating.customerId = cid;
  const cu = db.getById(db.COLLECTIONS.customers, cid);
  if (cu) {
    creating.customerName = cu.name;
    if (cu.preferredCurrency) creating.currency = cu.preferredCurrency;
    if (cu.paymentTerms) creating.paymentTerms = cu.paymentTerms;
  }
  render();
}

function addItem() {
  creating.items.push({ formulaId: '', formulaName: '', description: '', quantity: 0, unit: 'kg', unitPrice: 0, discount: 0, exempt: false });
  render();
}

function updateItemFormula(idx, fid) {
  const f = db.getById(db.COLLECTIONS.formulas, fid);
  if (f) {
    creating.items[idx].formulaId = fid;
    creating.items[idx].formulaName = f.name;
    creating.items[idx].description = f.name;
    creating.items[idx].unit = f.batchUnit;
  } else {
    creating.items[idx].formulaId = '';
    creating.items[idx].formulaName = '';
  }
  render();
}

function updateItemFast(idx, field, val) {
  const num = parseFloat(val) || 0;
  creating.items[idx][field] = num;
  // Actualizar línea
  const item = creating.items[idx];
  const line = (item.quantity||0) * (item.unitPrice||0) * (1 - (item.discount||0)/100);
  const lineEl = document.getElementById(`ven-line-${idx}`);
  if (lineEl) lineEl.textContent = currency.format(line, creating.currency);
  // Actualizar totales
  recomputeAndRefreshSummary();
}

function updateItemExempt(idx, checked) {
  creating.items[idx].exempt = checked;
  recomputeAndRefreshSummary();
}

function recomputeAndRefreshSummary() {
  const cfg = db.getById(db.COLLECTIONS.config, 'main') || {};
  const ivaRate = cfg.ivaRate || 16;
  const subtotal = creating.items.reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0) * (1 - (parseFloat(it.discount)||0)/100)), 0);
  const taxableBase = creating.items.filter(it => !it.exempt).reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0) * (1 - (parseFloat(it.discount)||0)/100)), 0);
  const ivaAmount = taxableBase * ivaRate / 100;
  const total = subtotal + ivaAmount;
  const summaryBody = document.getElementById('ven-summary-body');
  if (summaryBody) summaryBody.innerHTML = renderVenSummary(subtotal, ivaAmount, total, ivaRate, creating);
}

function removeItem(idx) {
  creating.items.splice(idx, 1);
  render();
}

function cancelCreate() { creating = null; view = 'list'; render(); }

function saveDoc() {
  const c = creating;
  if (!c.customerId) { ui.toast('Selecciona un cliente', 'error'); return; }
  if (!c.items.length) { ui.toast('Agrega al menos un ítem', 'error'); return; }
  for (const it of c.items) {
    if (!it.formulaId) { ui.toast('Cada ítem debe tener producto seleccionado', 'error'); return; }
    if (!it.quantity || it.quantity <= 0) { ui.toast('Cada ítem debe tener cantidad', 'error'); return; }
    if (!it.unitPrice || it.unitPrice <= 0) { ui.toast('Cada ítem debe tener precio', 'error'); return; }
  }

  // Verificar disponibilidad (solo para tipos que afectan stock)
  if (sales.STOCK_AFFECTING_TYPES.includes(c.type || 'PEDIDO')) {
    const check = sales.checkStockAvailability(c.items);
    if (!check.ok) {
      // Mostrar warning y pedir confirmación
      const lines = check.warnings.map(w =>
        `· ${w.formulaName}: pediste ${w.requested}, disponible ${w.available} (faltan ${w.missing})`
      ).join('\n');
      const confirmed = confirm(
        `⚠️ ATENCIÓN: Stock insuficiente\n\n${lines}\n\n` +
        `El sistema descontará todo lo disponible y dejará el resto como faltante.\n` +
        `Podés reponer producto y luego completar.\n\n` +
        `¿Querés guardar el documento igual?`
      );
      if (!confirmed) return;
    }
  }

  try {
    const doc = sales.create({
      customerId: c.customerId,
      currency: c.currency,
      rateType: c.rateType,
      items: c.items,
      status: c.type || 'PEDIDO',
      notes: c.notes,
      paymentTerms: c.paymentTerms,
      dueDate: c.dueDate
    });
    const labels = { PEDIDO: 'Pedido', NOTA_ENTREGA: 'Nota de Entrega', COTIZACION: 'Cotización', FACTURA: 'Factura' };
    ui.toast(`${labels[c.type] || 'Pedido'} creada`, 'success');

    // Ya no se redirige a assignLots: el create automáticamente asigna FEFO.
    // El usuario puede cambiar lotes manualmente desde el detalle.
    selectedId = doc.id; view = 'detail'; creating = null;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

// ====== DETALLE ======

function backToList() { view = 'list'; selectedId = null; render(); }

      actions += `<button class="btn btn-secondary" onclick="convertTo('${d.id}','NOTA_ENTREGA')">→ Nota de Entrega</button>`;

      actions += `<button class="btn btn-secondary" onclick="printDoc('${d.id}')">${ui.icon('download')} Imprimir Nota</button>`;

      }

        actions += `<button class="btn btn-primary" onclick="goAssignLots('${d.id}')">${ui.icon('box')} Asignar lotes</button>`;
      }
      // Solo permitir reversión a NE si no hay pagos
      if ((d.paidAmount || 0) === 0) {

      actions += `<button class="btn btn-secondary" onclick="printDoc('${d.id}')">${ui.icon('download')} Imprimir factura</button>`;
      if (remaining > 0.01 && d.status !== 'PAID') {
        actions += `<a href="pagos.html?doc=${d.id}" class="btn btn-primary">${ui.icon('plus')} Registrar cobro</a>`;
      }

  const itemsTable = `<table>
    <thead><tr><th>Producto</th><th style="text-align:right;">Cantidad</th><th>Unidad</th><th style="text-align:right;">Precio</th><th style="text-align:right;">Desc</th><th>IVA</th><th style="text-align:right;">Subtotal</th></tr></thead>
    <tbody>${d.items.map((it, idx) => {
      const allocs = it.allocations || [];

        <td>${it.exempt ? '<span class="badge badge-warning" style="font-size:10px;">Exento</span>' : `<span class="text-muted" style="font-size:11px;">${d.ivaRate}%</span>`}</td>

      <div class="action-bar">

        <div class="kpi"><div class="kpi-label">${d.type === 'FACTURA' ? 'Pendiente' : 'Estado'}</div>${d.type === 'FACTURA' ? `<div class="kpi-value" style="color:${remaining>0.01?'var(--danger)':'var(--success)'};">${currency.formatCompact(remaining, d.currency)}</div><div class="kpi-value-sub">de ${currency.format(d.total, d.currency)}</div>` : `<div class="kpi-value" style="font-size:20px;">${sLabel}</div>`}</div>

      ${d.invoiceNumber ? `<div class="card mb-24" style="padding:14px 18px;background:var(--accent-soft);border-color:#cdd9c8;">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:13px;">

function convertTo(docId, newStatus) {
  const d = db.getById(db.COLLECTIONS.salesOrders, docId);
  const labels = { COTIZACION: 'Cotización', NOTA_ENTREGA: 'Nota de Entrega', FACTURA: 'Factura' };

  let message = '';
  if (newStatus === 'FACTURA') {
    if (d.type === 'NOTA_ENTREGA') {
      message = `¿Convertir esta Nota de Entrega en Factura? Se asignará número fiscal, se calculará el IVA y entrará en el Libro de Ventas.`;
    } else {
      message = `¿Convertir a Factura? Se asignará un número fiscal de factura y de control. Después podrás asignar los lotes de PT que se entregarán.`;
    }
  } else if (newStatus === 'NOTA_ENTREGA') {
    if (d.type === 'FACTURA') {
      message = `¿Revertir a Nota de Entrega? Se quitará el IVA, el número fiscal y saldrá del Libro de Ventas. Solo es posible porque no hay pagos asociados.`;
    } else {
      message = `¿Convertir a Nota de Entrega? Se descontará inventario inmediatamente pero NO se calculará IVA ni entrará en libros fiscales.`;
    }
  } else {
    message = `¿Convertir a ${labels[newStatus]}?`;
  }

  ui.confirm(message, () => {
    try {
      sales.convertTo(docId, newStatus);
      ui.toast(`Convertido a ${labels[newStatus]}`, 'success');
      // Si se convierte a NE o Factura y no tiene lotes asignados, ir a asignación
      const updated = db.getById(db.COLLECTIONS.salesOrders, docId);
      if ((newStatus === 'NOTA_ENTREGA' || newStatus === 'FACTURA') && !updated.lotsAssigned) {
        view = 'assign';
        render();
      } else {
        render();
      }
    } catch (err) {
      ui.toast(err.message, 'error');
    }
  }, { confirmLabel: 'Convertir' });
}

            <div class="text-muted" style="font-size:11px;margin-bottom:${f.moneyAction==='REFUND'?'8px':'0'};">Le devolvés la plata al cliente desde una cuenta bancaria.</div>
            ${f.moneyAction==='REFUND' ? `
              <div class="form-grid form-grid-2" style="margin-top:6px;">

function setNCReason(reason) { _ncForm.reason = reason; renderCreditNoteForm(); }
function setNCMode(mode) { _ncForm.mode = mode; renderCreditNoteForm(); }
function setNCMoney(action) { _ncForm.moneyAction = action; renderCreditNoteForm(); }
function toggleNCItem(idx) {
  const it = _ncForm.items[idx];
  it.include = !it.include;
  if (it.include && it.quantity === 0) it.quantity = it.maxQty;
  if (!it.include) it.quantity = 0;
  renderCreditNoteForm();
}
function updateNCItemQty(idx, val) {
  // SIN render: actualiza en memoria. Solo actualiza el resumen total.
  const it = _ncForm.items[idx];
  const num = Math.min(parseFloat(val) || 0, it.maxQty);
  it.quantity = num;
  // Actualizar el subtotal de esta fila si tiene id
  refreshNCSummary();
}
function updateNCItemStockAction(idx, action) {
  _ncForm.items[idx].stockAction = action;
}

/** Recalcula el subtotal/total de la NC y actualiza solo esos elementos del DOM */
function refreshNCSummary() {
  if (!_ncForm) return;
  const f = _ncForm;
  const inv = db.getById(db.COLLECTIONS.salesOrders, f.invoiceId);
  if (!inv) return;
  const cfg = db.getById(db.COLLECTIONS.config, 'main') || {};
  const ivaRate = inv.ivaRate || cfg.ivaRate || 16;

  let subtotal = 0, taxableBase = 0, exemptBase = 0;
  if (f.mode === 'BY_ITEMS') {
    f.items.forEach(it => {
      if (!it.include || it.quantity <= 0) return;
      const sub = (parseFloat(it.quantity) || 0) * (parseFloat(it.unitPrice) || 0);
      subtotal += sub;
      if (it.exempt) exemptBase += sub;
      else taxableBase += sub;
    });
  } else {
    const amt = parseFloat(f.freeAmount) || 0;
    subtotal = amt;
    if (f.freeAmountExempt) exemptBase = amt;
    else taxableBase = amt;
  }
  const ivaAmt = Math.round(taxableBase * ivaRate / 100 * 100) / 100;
  const total = Math.round((subtotal + ivaAmt) * 100) / 100;

  // Actualizar elementos puntuales del DOM (no re-render)
  const summary = document.getElementById('nc-summary-section');
  if (!summary) return;

  const alreadyCredited = sales.getCreditedAmount(f.invoiceId);
  const maxCreditable = inv.total - alreadyCredited;
  const exceeds = total > maxCreditable + 0.01;

  summary.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span class="text-muted">Subtotal</span><span class="td-mono">${currency.format(subtotal, inv.currency)}</span></div>
    ${exemptBase > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span class="text-muted">Exento</span><span class="td-mono">${currency.format(exemptBase, inv.currency)}</span></div>` : ''}
    ${taxableBase > 0 ? `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span class="text-muted">IVA ${ivaRate}%</span><span class="td-mono">${currency.format(ivaAmt, inv.currency)}</span></div>` : ''}
    <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);margin-top:6px;"><span class="td-strong">Total NC</span><span class="td-mono td-strong" style="font-size:15px;color:${exceeds?'var(--danger)':'var(--accent-ink)'};">${currency.format(total, inv.currency)}</span></div>
    <div style="font-size:11px;color:var(--ink-3);margin-top:6px;">Máximo acreditable: ${currency.format(maxCreditable, inv.currency)} ${alreadyCredited>0?`(ya hay ${currency.format(alreadyCredited, inv.currency)} acreditado)`:''}</div>
    ${exceeds ? `<div style="margin-top:8px;padding:8px;background:#fee2e2;border-radius:4px;color:#991b1b;font-size:12px;">⚠️ El total excede lo acreditable</div>` : ''}
  `;
}

function confirmCreditNote() {
  const f = _ncForm;
  if (!f) return;

  const args = {
    invoiceId: f.invoiceId,
    reason: f.reason,
    mode: f.mode,
    invoiceNumber: f.invoiceNumber,
    controlNumber: f.controlNumber,
    notes: f.notes,
    moneyAction: f.moneyAction,
    refundAccountId: f.refundAccountId,
    refundAmount: f.refundAmount
  };

  if (f.mode === 'BY_ITEMS') {
    const includedItems = f.items.filter(i => i.include && i.quantity > 0).map(i => ({
      formulaId: i.formulaId,
      formulaName: i.formulaName,
      quantity: i.quantity,
      unit: i.unit,
      unitPrice: i.unitPrice,
      exempt: i.exempt,
      stockAction: f.reason === 'RETURN' ? i.stockAction : null,
      originalLotId: i.originalLotId
    }));
    if (!includedItems.length) {
      ui.toast('Selecciona al menos un ítem', 'error');
      return;
    }
    args.items = includedItems;
  } else {
    args.freeAmount = f.freeAmount;
    args.freeAmountExempt = f.freeAmountExempt;
  }

  if (f.moneyAction === 'REFUND') {
    if (!f.refundAccountId) { ui.toast('Selecciona una cuenta para el reembolso', 'error'); return; }
    if (!f.refundAmount || f.refundAmount <= 0) { ui.toast('Indica el monto del reembolso', 'error'); return; }
  }

  try {
    const note = sales.createCreditNote(args);
    ui.closeModal();
    _ncForm = null;
    ui.toast(`NC ${note.code} emitida correctamente`, 'success');
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

/** Permite cambiar los lotes asignados a un item */
function changeLotsForItem(docId, itemIdx) {
  const d = db.getById(db.COLLECTIONS.salesOrders, docId);
  if (!d) return;
  const item = d.items[itemIdx];
  if (!item) return;

  // Lotes disponibles para esta fórmula (incluye los ya asignados a este doc, porque al cambiar se reasignan)
  const allocsForThisItem = item.allocations || [];
  const allocByLot = {};
  allocsForThisItem.forEach(a => { allocByLot[a.lotId] = (allocByLot[a.lotId] || 0) + a.quantity; });

  const lots = db.query(db.COLLECTIONS.finishedGoods, l =>
    l.formulaId === item.formulaId && l.status === 'LIBERADO' && (l.balance + (allocByLot[l.id]||0)) > 0
  ).sort((a, b) => (a.expiryDate||'9999').localeCompare(b.expiryDate||'9999'));

  ui.openModal({
    title: `Cambiar lotes: ${item.formulaName||item.description}`,
    body: `
      <p class="text-muted" style="font-size:12px;margin-bottom:12px;">
        Cantidad total a asignar: <strong>${item.quantity} ${item.unit||''}</strong>.
        Asigna cantidades de uno o más lotes hasta cubrir el total.
      </p>
      <div id="change-lots-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;">
        ${lots.length ? lots.map(lot => {
          const currentlyHere = allocByLot[lot.id] || 0;
          const trueAvailable = lot.balance + currentlyHere;
          return `<div class="list-row" style="grid-template-columns:1fr 110px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;align-items:center;">
            <div>
              <div class="td-strong" style="font-size:13px;">${ui.escape(lot.code)}</div>
              <div class="text-muted" style="font-size:11px;">Vence ${ui.formatDate(lot.expiryDate)} · Disp: ${trueAvailable.toFixed(2)} ${ui.escape(lot.unit||'')}</div>
            </div>
            <input type="number" step="0.01" min="0" max="${trueAvailable}" value="${currentlyHere}"
                   class="input lot-input" data-lot-id="${lot.id}"
                   style="text-align:right;font-family:var(--font-mono);">
          </div>`;
        }).join('') : '<div class="empty-state"><div class="empty-state-text">No hay lotes disponibles para esta fórmula.</div></div>'}
      </div>
      <div style="margin-top:12px;padding:10px;background:var(--surface-2);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;">
        <span>Total asignado:</span>
        <strong id="total-assigned">${(item.allocations||[]).reduce((s,a)=>s+a.quantity,0).toFixed(2)} / ${item.quantity}</strong>
      </div>
    `,
    footer: `<button class="btn btn-secondary" onclick="ui.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmChangeLots('${docId}', ${itemIdx})">${ui.icon('check')} Aplicar</button>`
  });

  // Listener para actualizar el total a medida que cambian los inputs
  setTimeout(() => {
    document.querySelectorAll('.lot-input').forEach(inp => {
      inp.addEventListener('input', () => {
        const total = Array.from(document.querySelectorAll('.lot-input'))
          .reduce((s, i) => s + (parseFloat(i.value) || 0), 0);
        const totalEl = document.getElementById('total-assigned');
        if (totalEl) {
          totalEl.textContent = total.toFixed(2) + ' / ' + item.quantity;
          totalEl.style.color = Math.abs(total - item.quantity) < 0.01 ? 'var(--success)' : 'var(--danger)';
        }
      });
    });
  }, 100);
}

function confirmChangeLots(docId, itemIdx) {
  const newAllocations = Array.from(document.querySelectorAll('.lot-input'))
    .map(inp => ({
      lotId: inp.dataset.lotId,
      quantity: parseFloat(inp.value) || 0
    }))
    .filter(a => a.quantity > 0);

  try {
    sales.changeItemLots(docId, itemIdx, newAllocations);
    ui.closeModal();
    ui.toast('Lotes actualizados', 'success');
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

// ====== ASIGNACIÓN DE LOTES (FEFO) ======

function goAssignLots(docId) {
  const d = db.getById(db.COLLECTIONS.salesOrders, docId);
  if (!d) return;
  const suggested = sales.suggestLotsForDoc(d);
  assigning = {
    docId,
    docCode: d.invoiceNumber || d.code,
    items: suggested.map(it => ({
      ...it,
      // Si hay sugerencia, preestablecer las allocations con la sugerencia
      allocations: it.suggestions ? it.suggestions.map(s => ({ lotId: s.lotId, lotCode: s.lotCode, expiryDate: s.expiryDate, available: s.available, quantity: s.take })) : []
    }))
  };
  view = 'assignLots'; render();
}

function renderAssignLots() {
  const a = assigning;
  const d = db.getById(db.COLLECTIONS.salesOrders, a.docId);

  // Verificar si todos los items están cubiertos
  const allCovered = a.items.every(it => {
    const totalAssigned = (it.allocations||[]).reduce((s, al) => s + (parseFloat(al.quantity)||0), 0);
    return Math.abs(totalAssigned - it.quantity) < 0.01;
  });

  const itemsHtml = a.items.map((it, idx) => {
    const totalAssigned = (it.allocations||[]).reduce((s, al) => s + (parseFloat(al.quantity)||0), 0);
    const remaining = it.quantity - totalAssigned;
    const ok = Math.abs(remaining) < 0.01;
    // Lotes disponibles (FEFO) para este formula
    const availableLots = db.query(db.COLLECTIONS.finishedGoods, l =>
      l.formulaId === it.formulaId &&
      l.status === 'LIBERADO' &&
      (l.balance - (l.reserved||0)) > 0
    ).sort((x,y) => (x.expiryDate||'9999').localeCompare(y.expiryDate||'9999'));

    return `<div class="card mb-24" style="padding:0;">
      <div style="padding:14px 20px;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <div>
            <div class="card-title" style="font-size:15px;">${ui.escape(it.formulaName||it.description)}</div>
            <div class="text-muted" style="font-size:12px;margin-top:2px;">Solicitado: ${it.quantity.toFixed(3)} ${it.unit} · Asignado: ${totalAssigned.toFixed(3)} · ${ok ? '<span style="color:var(--success);">✓ Completo</span>' : `<span style="color:var(--danger);">Falta: ${remaining.toFixed(3)}</span>`}</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="addAllocation(${idx})">${ui.icon('plus')} Agregar lote</button>
        </div>
      </div>
      ${(it.allocations||[]).length ? `<table>
        <thead><tr><th>Lote</th><th>Vence</th><th style="text-align:right;">Disponible</th><th style="text-align:right;">A entregar</th><th style="width:40px;"></th></tr></thead>
        <tbody>${it.allocations.map((al, alIdx) => {
          const lot = db.getById(db.COLLECTIONS.finishedGoods, al.lotId);
          return `<tr>
            <td><select class="select" onchange="updateAllocation(${idx}, ${alIdx}, 'lotId', this.value)">
              <option value="">— Selecciona lote —</option>
              ${availableLots.map(l => `<option value="${l.id}" ${l.id===al.lotId?'selected':''}>${l.code} · vence ${l.expiryDate||'—'} · disp: ${(l.balance - (l.reserved||0)).toFixed(3)}</option>`).join('')}
            </select></td>
            <td><span class="text-muted">${lot?.expiryDate ? ui.formatDate(lot.expiryDate) : '—'}</span></td>
            <td style="text-align:right;"><span class="td-mono">${al.available?.toFixed(3) || (lot ? (lot.balance - (lot.reserved||0)).toFixed(3) : '—')}</span></td>
            <td style="text-align:right;"><input class="input" type="number" step="0.001" value="${al.quantity||''}" style="text-align:right;font-family:var(--font-mono);width:140px;" oninput="updateAllocationFast(${idx}, ${alIdx}, this.value)"></td>
            <td><button class="btn-icon" onclick="removeAllocation(${idx}, ${alIdx})">${ui.icon('trash')}</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : `<div style="padding:24px;text-align:center;color:var(--ink-3);">Sin lotes asignados.${availableLots.length ? '' : ' <span style="color:var(--danger);">No hay lotes liberados de este producto.</span>'}</div>`}
    </div>`;
  }).join('');

  ui.renderLayout({
    activeModule: 'ventas', pageEyebrow: 'Asignar lotes', pageTitle: a.docCode,
    contentHtml: `
      <div class="card mb-24" style="padding:14px 18px;background:#eff6ff;border-color:#bfdbfe;">
        <div style="font-size:12.5px;color:#1e3a8a;line-height:1.5;">
          <strong>📦 Asignación FEFO:</strong> Los lotes están ordenados automáticamente por fecha de vencimiento (los que vencen primero, salen primero). Podés cambiar la asignación si querés. Al confirmar, se descontará el inventario.
        </div>
      </div>

      ${itemsHtml}

      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="cancelAssign()">← Cancelar</button>
        <button class="btn btn-primary" onclick="saveAssignment()" ${!allCovered?'disabled style="opacity:0.5;cursor:not-allowed;"':''}>${ui.icon('check')} Confirmar asignación y descontar inventario</button>
      </div>
      <div style="height:40px;"></div>
    `
  });
}

function addAllocation(itemIdx) {
  if (!assigning.items[itemIdx].allocations) assigning.items[itemIdx].allocations = [];
  assigning.items[itemIdx].allocations.push({ lotId: '', quantity: 0 });
  render();
}

function updateAllocation(itemIdx, alIdx, field, val) {
  assigning.items[itemIdx].allocations[alIdx][field] = val;
  // Si cambió el lote, actualizar disponibilidad
  if (field === 'lotId' && val) {
    const lot = db.getById(db.COLLECTIONS.finishedGoods, val);
    if (lot) {
      assigning.items[itemIdx].allocations[alIdx].lotCode = lot.code;
      assigning.items[itemIdx].allocations[alIdx].expiryDate = lot.expiryDate;
      assigning.items[itemIdx].allocations[alIdx].available = lot.balance - (lot.reserved||0);
    }
  }
  render();
}

function updateAllocationFast(itemIdx, alIdx, val) {
  assigning.items[itemIdx].allocations[alIdx].quantity = parseFloat(val) || 0;
  // Solo actualizar el "Asignado / Falta" sin re-render completo. Re-render para validación final.
  // Por simplicidad, hacer render ahora — es solo el panel de asignación
  render();
}

function removeAllocation(itemIdx, alIdx) {
  assigning.items[itemIdx].allocations.splice(alIdx, 1);
  render();
}

function cancelAssign() { assigning = null; selectedId = assigning?.docId; view = 'detail'; render(); }

function saveAssignment() {
  const a = assigning;
  const lotAssignments = a.items.map((it, idx) => ({
    itemIdx: idx,
    allocations: (it.allocations||[]).filter(al => al.lotId && al.quantity > 0).map(al => ({ lotId: al.lotId, quantity: al.quantity }))
  }));
  try {
    sales.confirmLotAssignment(a.docId, lotAssignments);
    ui.toast('Lotes asignados · inventario descontado', 'success');
    selectedId = a.docId; view = 'detail'; assigning = null;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
