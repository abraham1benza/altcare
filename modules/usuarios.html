<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script type="module" src="../assets/js/firebase-init.js"></script>
<script src="../assets/js/module-init-v2.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
moduleInit('usuarios').then(async (ok) => {
if (!ok) return;

function render() {
  const items = db.getAll(db.COLLECTIONS.users);
  const me = auth.currentUser();

  const tableHtml = `<table>
    <thead><tr>
      <th>Usuario</th>
      <th>Nombre completo</th>
      <th>Rol</th>
      <th>Estado</th>
      <th>Creado</th>
      <th style="text-align:right;width:110px;">Acciones</th>
    </tr></thead>
    <tbody>
      ${items.map(r => {
        const role = auth.ROLES[r.role] || { label: r.role };
        const isMe = r.username === me.username;
        return `
          <tr>
            <td>
              <div class="td-strong td-mono">${ui.escape(r.username)}</div>
              ${isMe ? '<span class="badge badge-accent" style="margin-top:4px;">Tú</span>' : ''}
            </td>
            <td>${ui.escape(r.fullName||'—')}</td>
            <td><span class="badge" style="background:${role.color}15;color:${role.color};">${role.label}</span></td>
            <td>${r.active ? '<span class="badge badge-success">Activo</span>' : '<span class="badge badge-danger">Inactivo</span>'}</td>
            <td><span class="text-muted">${ui.formatDate(r.createdAt)}</span></td>
            <td class="td-actions">
              <button class="btn-icon" onclick="editItem('${r.id}')" title="Editar">${ui.icon('edit')}</button>
              ${!isMe ? `<button class="btn-icon" onclick="deleteItem('${r.id}')" title="Eliminar">${ui.icon('trash')}</button>` : ''}
            </td>
          </tr>
        `;
      }).join('')}
    </tbody>
  </table>`;

  // Roles overview
  const rolesHtml = Object.entries(auth.ROLES).map(([key, r]) => {
    const allowedModules = Object.entries(auth.PERMISSIONS).filter(([m, roles]) => roles.includes(key)).length;
    return `
      <div class="card" style="padding:16px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${r.color};"></div>
          <div class="td-strong">${r.label}</div>
        </div>
        <div class="text-muted" style="font-size:12px;">Acceso a ${allowedModules} módulos</div>
      </div>
    `;
  }).join('');

  const content = `
    <div class="action-bar">
      <div class="action-bar-left">
        <h2 class="action-bar-title">Usuarios</h2>
        <span class="action-bar-count">${items.length} cuentas</span>
      </div>
      <div class="action-bar-right">
        <button class="btn btn-primary" onclick="newItem()">${ui.icon('plus')} Nuevo usuario</button>
      </div>
    </div>

    <div class="table-wrap mb-24">${tableHtml}</div>

    <div class="divider-section"><span class="section-title" style="margin:0;">Roles del sistema</span></div>
    <div class="grid grid-4">${rolesHtml}</div>
  `;

  ui.renderLayout({
    activeModule: 'usuarios',
    pageEyebrow: 'Sistema',
    pageTitle: 'Usuarios y Permisos',
    contentHtml: content
  });
}

function newItem() {
  openForm({ active: true, role: 'produccion' });
}

function editItem(id) {
  const r = db.getById(db.COLLECTIONS.users, id);
  if (r) openForm(r);
}

function openForm(item) {
  const isNew = !item.id;
  const me = auth.currentUser();
  const isMe = item.username === me.username;

  ui.openModal({
    title: isNew ? 'Nuevo usuario' : 'Editar usuario',
    body: `
      <form id="usr-form" autocomplete="off" onsubmit="saveItem(event, '${item.id || ''}')">
        <div class="form-grid form-grid-2">
          <div class="field" style="grid-column:1/-1;">
            <label class="field-label">Email * (para iniciar sesión)</label>
            <input class="input" type="email" name="email" required value="${ui.escape(item.email||'')}" ${!isNew?'readonly':''} placeholder="usuario@empresa.com" autocomplete="new-email" autocapitalize="off" spellcheck="false">
            ${!isNew ? '<div class="field-hint">El email no se puede cambiar desde acá. Usá Firebase Console si necesitás modificarlo.</div>' : '<div class="field-hint">Este email se usará para iniciar sesión</div>'}
          </div>
          <div class="field">
            <label class="field-label">Usuario (alias) *</label>
            <input class="input" name="username" required value="${ui.escape(item.username||'')}" ${!isNew?'readonly':''} placeholder="ej: maria.lopez" autocomplete="off" autocapitalize="off" spellcheck="false">
            ${!isNew ? '<div class="field-hint">El alias no se puede cambiar</div>' : '<div class="field-hint">Solo para mostrar internamente</div>'}
          </div>
          <div class="field">
            <label class="field-label">Nombre completo *</label>
            <input class="input" name="fullName" required value="${ui.escape(item.fullName||'')}">
          </div>
          ${isNew ? `<div class="field" style="grid-column:1/-1;">
            <label class="field-label">Contraseña *</label>
            <input class="input" type="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <div class="field-hint">⚠️ Después de crear el usuario, vas a tener que volver a iniciar sesión con tu cuenta de admin.</div>
          </div>` : ''}
          <div class="field">
            <label class="field-label">Rol *</label>
            <select class="select" name="role" required ${isMe?'disabled':''} onchange="onRoleChangeInUserForm(this.value)">
              ${Object.entries(auth.ROLES).map(([k, r]) => `<option value="${k}" ${k===item.role?'selected':''}>${r.label}</option>`).join('')}
            </select>
            ${isMe ? '<div class="field-hint">No puedes cambiar tu propio rol</div>' : ''}
            ${isMe ? `<input type="hidden" name="role" value="${item.role}">` : ''}
          </div>
          <div class="field">
            <label class="field-label">Estado</label>
            <select class="select" name="active" ${isMe?'disabled':''}>
              <option value="true" ${item.active?'selected':''}>Activo</option>
              <option value="false" ${!item.active?'selected':''}>Inactivo</option>
            </select>
            ${isMe ? `<input type="hidden" name="active" value="true">` : ''}
          </div>
          <div class="field" style="grid-column:1/-1;">
            <label class="field-label">Modos permitidos *</label>
            <div style="display:flex;gap:12px;margin-top:6px;">
              <label class="checkbox-row" style="flex:1;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;cursor:pointer;">
                <input type="checkbox" name="mode_gerencial" ${(item.allowedModes||[]).includes('gerencial')?'checked':''} ${item.role==='admin'?'checked disabled':''}>
                <div style="margin-left:8px;">
                  <div style="font-weight:600;font-size:13px;">📊 Gerencial</div>
                  <div class="text-muted" style="font-size:11px;">USD · Tasa Binance</div>
                </div>
              </label>
              <label class="checkbox-row" style="flex:1;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;cursor:pointer;">
                <input type="checkbox" name="mode_contable" ${(item.allowedModes||['contable']).includes('contable')?'checked':''} ${item.role==='admin'?'checked disabled':''}>
                <div style="margin-left:8px;">
                  <div style="font-weight:600;font-size:13px;">📋 Contable</div>
                  <div class="text-muted" style="font-size:11px;">VES · Tasa BCV</div>
                </div>
              </label>
            </div>
            <div class="field-hint">Si tiene ambos, podrá alternar desde el sidebar. Admin siempre tiene los dos.</div>
          </div>

          <div class="field" style="grid-column:1/-1;">
            <label class="field-label">Módulos permitidos *</label>
            <div class="text-muted" style="font-size:11.5px;margin-bottom:8px;">
              Al cambiar el rol se pre-marcan los módulos predeterminados. Podés agregar o quitar módulos individualmente.
            </div>
            <div id="modules-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;padding:12px;background:var(--surface-2);border-radius:8px;border:1px solid var(--border);">
              ${(() => {
                const ALL_MODULES = [
                  { key: 'dashboard', label: 'Dashboard', group: 'general' },
                  { key: 'tasas-cambio', label: 'Tasas de Cambio', group: 'general' },
                  { key: 'configuracion', label: 'Configuración', group: 'general' },
                  { key: 'usuarios', label: 'Usuarios', group: 'general' },
                  { key: 'proveedores', label: 'Proveedores', group: 'comercial' },
                  { key: 'clientes', label: 'Clientes', group: 'comercial' },
                  { key: 'ventas', label: 'Ventas', group: 'comercial' },
                  { key: 'compras', label: 'Compras', group: 'comercial' },
                  { key: 'pagos', label: 'Pagos', group: 'comercial' },
                  { key: 'cuentas-bancarias', label: 'Cuentas Bancarias', group: 'comercial' },
                  { key: 'metodos-pago', label: 'Métodos de Pago', group: 'comercial' },
                  { key: 'materias-primas', label: 'Materias Primas', group: 'inventario' },
                  { key: 'producto-terminado', label: 'Producto Terminado', group: 'inventario' },
                  { key: 'almacenes', label: 'Almacenes', group: 'inventario' },
                  { key: 'almacen', label: 'Almacén General', group: 'inventario' },
                  { key: 'trazabilidad', label: 'Trazabilidad', group: 'inventario' },
                  { key: 'formulas', label: 'Fórmulas', group: 'produccion' },
                  { key: 'produccion', label: 'Producción (OF)', group: 'produccion' },
                  { key: 'envasado', label: 'Envasado', group: 'produccion' },
                  { key: 'calidad', label: 'Control Calidad', group: 'produccion' },
                  { key: 'reportes', label: 'Reportes', group: 'general' },
                  { key: 'notificaciones', label: 'Notificaciones', group: 'comercial' }
                ];
                // Calcular módulos asignados según rol + extras del perfil
                const role = item.role || 'produccion';
                const baseModules = auth.ROLES[role]?.modules || [];
                const isAll = baseModules === '*';
                const extra = item.extraModules || [];
                const allowed = isAll ? ALL_MODULES.map(m => m.key) : Array.from(new Set([...baseModules, ...extra]));

                return ALL_MODULES.map(m => {
                  const checked = allowed.includes(m.key);
                  const isFromRole = isAll || baseModules.includes(m.key);
                  const adminLocked = item.role === 'admin'; // admin siempre tiene todo
                  return `<label style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:white;border-radius:5px;cursor:pointer;font-size:12px;border:1px solid ${checked?'var(--accent)':'var(--border)'};${checked?'background:#f3f6f0;':''}">
                    <input type="checkbox" name="module_${m.key}" ${checked?'checked':''} ${adminLocked?'disabled':''} data-from-role="${isFromRole}">
                    <span>${m.label}</span>
                    ${isFromRole?'<span class="text-muted" style="font-size:10px;margin-left:auto;" title="Del rol predeterminado">📌</span>':''}
                  </label>`;
                }).join('');
              })()}
            </div>
            <div class="field-hint" style="margin-top:6px;">📌 = módulo del rol predeterminado · Sin marcar = oculto del sidebar y bloqueado por URL</div>
          </div>
        </div>
      </form>
    `,
    footer: `
      <button class="btn btn-secondary" onclick="ui.closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="document.getElementById('usr-form').requestSubmit()">${ui.icon('check')} Guardar</button>
    `
  });
}

/** Cuando cambia el rol en el form, recalcular los checkboxes de módulos */
function onRoleChangeInUserForm(newRole) {
  const baseModules = auth.ROLES[newRole]?.modules || [];
  const isAll = baseModules === '*';
  // Recorrer todos los checkboxes de módulos
  document.querySelectorAll('#modules-list input[type="checkbox"]').forEach(cb => {
    const moduleKey = cb.name.replace('module_', '');
    const isFromRole = isAll || (Array.isArray(baseModules) && baseModules.includes(moduleKey));
    cb.checked = isFromRole;
    cb.disabled = (newRole === 'admin'); // admin siempre tiene todo
    cb.dataset.fromRole = isFromRole ? 'true' : 'false';
    // Actualizar estilo del label
    const label = cb.closest('label');
    if (label) {
      label.style.borderColor = isFromRole ? 'var(--accent)' : 'var(--border)';
      label.style.background = isFromRole ? '#f3f6f0' : 'white';
      // Actualizar el ícono 📌
      const pin = label.querySelector('span[style*="margin-left:auto"]');
      if (isFromRole && !pin) {
        const newPin = document.createElement('span');
        newPin.className = 'text-muted';
        newPin.style.cssText = 'font-size:10px;margin-left:auto;';
        newPin.title = 'Del rol predeterminado';
        newPin.textContent = '📌';
        label.appendChild(newPin);
      } else if (!isFromRole && pin) {
        pin.remove();
      }
    }
  });
}

async function saveItem(e, id) {
  e.preventDefault();
  const data = ui.formData(e.target);
  data.active = data.active === true || data.active === 'true';
  if (!data.fullName) { ui.toast('Completa el nombre completo', 'error'); return; }
  if (!id && !data.email) { ui.toast('El email es obligatorio', 'error'); return; }

  // Procesar modos permitidos
  const fd = new FormData(e.target);
  const modes = [];
  if (fd.get('mode_gerencial')) modes.push('gerencial');
  if (fd.get('mode_contable')) modes.push('contable');
  if (data.role === 'admin') {
    data.allowedModes = ['gerencial', 'contable'];
  } else if (modes.length === 0) {
    ui.toast('Asigná al menos un modo permitido', 'error');
    return;
  } else {
    data.allowedModes = modes;
  }
  delete data.mode_gerencial;
  delete data.mode_contable;

  // Procesar módulos permitidos
  // Recorrer todos los checkboxes module_* y armar la lista de módulos permitidos
  const allCheckboxes = e.target.querySelectorAll('input[name^="module_"]');
  const checkedModules = [];
  allCheckboxes.forEach(cb => {
    if (cb.checked) {
      checkedModules.push(cb.name.replace('module_', ''));
    }
    delete data[cb.name]; // limpiar del data del form
  });

  if (data.role !== 'admin') {
    // Calcular extraModules: módulos marcados que NO son del rol predeterminado
    const baseModules = auth.ROLES[data.role]?.modules || [];
    const isAll = baseModules === '*';
    if (!isAll) {
      // extras = módulos marcados que no están en baseModules
      data.extraModules = checkedModules.filter(m => !baseModules.includes(m));
      // hiddenModules = módulos del rol que están desmarcados (los que el admin quitó)
      data.hiddenModules = baseModules.filter(m => !checkedModules.includes(m));
    } else {
      data.extraModules = [];
      data.hiddenModules = [];
    }
  } else {
    // Admin tiene todo
    data.extraModules = [];
    data.hiddenModules = [];
  }

  if (!id) {
    // CREACIÓN: validar y crear en Firebase Auth + Firestore
    // Protección: no permitir crear con email o alias del admin actual (caso autocompletado)
    const me = auth.currentUser();
    if (me && (data.email === me.email || data.username === me.email || data.username === me.username)) {
      ui.toast('No podés crear un usuario con tu propio email o alias. Borrá los campos y poné los datos del usuario nuevo.', 'error', 6000);
      return;
    }
    const existing = db.query(db.COLLECTIONS.users, u => u.username === data.username || u.email === data.email);
    if (existing.length) { ui.toast('Ya existe un usuario con ese email o alias', 'error'); return; }
    if (!data.password || data.password.length < 6) { ui.toast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }

    // Confirmar al admin que va a tener que volver a loguearse
    const confirmMsg = `Se creará el usuario "${data.fullName}" (${data.email}).\n\n` +
      `⚠️ IMPORTANTE: Por cómo funciona Firebase, después de crear el usuario tu sesión actual se va a cerrar y vas a tener que volver a iniciar sesión.\n\n` +
      `¿Continuar?`;
    if (!confirm(confirmMsg)) return;

    ui.toast('Creando usuario...', 'info');
    const result = await auth.createUser({
      email: data.email,
      password: data.password,
      username: data.username,
      fullName: data.fullName,
      role: data.role,
      allowedModes: data.allowedModes,
      extraModules: data.extraModules || [],
      hiddenModules: data.hiddenModules || [],
      active: data.active
    });

    if (!result.ok) {
      ui.toast('Error: ' + result.error, 'error', 6000);
      return;
    }

    ui.closeModal();
    ui.toast(`Usuario "${data.fullName}" creado correctamente. Volvé a iniciar sesión.`, 'success', 6000);
    // Redirigir al login en 2 segundos
    setTimeout(() => {
      window.location.href = '../index.html';
    }, 2000);

  } else {
    // EDICIÓN: solo actualizar el documento Firestore (no se cambian email/password desde acá)
    delete data.email; // no editable
    delete data.password; // no editable desde acá
    data.id = id;
    db.save(db.COLLECTIONS.users, data);
    ui.closeModal();
    ui.toast('Usuario actualizado', 'success');
    render();
  }
}

function deleteItem(id) {
  const r = db.getById(db.COLLECTIONS.users, id);
  const me = auth.currentUser();
  if (r.username === me.username) { ui.toast('No puedes eliminarte a ti mismo', 'error'); return; }
  ui.confirm(
    `¿Eliminar al usuario "${r.fullName || r.username}"? Perderá acceso al sistema inmediatamente.`,
    () => {
      db.remove(db.COLLECTIONS.users, id);
      ui.toast('Usuario eliminado', 'success');
      render();
    },
    { danger: true, confirmLabel: 'Eliminar' }
  );
}

render();


// Exponer funciones a window (para que onclick="" del HTML pueda llamarlas)
Object.assign(window, {
  render: typeof render !== 'undefined' ? render : undefined,
  newItem: typeof newItem !== 'undefined' ? newItem : undefined,
  editItem: typeof editItem !== 'undefined' ? editItem : undefined,
  openForm: typeof openForm !== 'undefined' ? openForm : undefined,
  saveItem: typeof saveItem !== 'undefined' ? saveItem : undefined,
  deleteItem: typeof deleteItem !== 'undefined' ? deleteItem : undefined,
});
});
</script>
</body>
</html>
