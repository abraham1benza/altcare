<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compras · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script type="module" src="../assets/js/firebase-init.js"></script>
<script src="../assets/js/module-init-v2.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/inventory.js"></script>
<script src="../assets/js/formulas.js"></script>
<script src="../assets/js/purchases.js"></script>
<script src="../assets/js/sales.js"></script>
<script src="../assets/js/payments.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
moduleInit('compras').then(async (ok) => {
if (!ok) return;

let view = 'list';     // list | poDetail | poCreate | invoiceDetail | invoiceCreate | receipt
let tab = 'pos';       // pos | invoices
let selectedId = null;
let editing = null;
let receiving = null;

function render() {
  if (view === 'poDetail') return renderPODetail();
  if (view === 'poCreate') return renderPOCreate();
  if (view === 'invoiceDetail') return renderInvoiceDetail();
  if (view === 'invoiceCreate') return renderInvoiceCreate();
  if (view === 'receipt') return renderReceipt();
  return renderList();
}

// ====== LISTA ======

function renderList() {
  const pos = db.getAll(db.COLLECTIONS.purchaseOrders).sort((a,b)=>(b.issueDate||'').localeCompare(a.issueDate||''));
  const invoices = db.getAll(db.COLLECTIONS.supplierInvoices).sort((a,b)=>(b.issueDate||'').localeCompare(a.issueDate||''));

  const counts = {
    posActive: pos.filter(p => p.status === 'DRAFT' || p.status === 'SENT' || p.status === 'PARTIAL').length,
    posReceived: pos.filter(p => p.status === 'RECEIVED').length,
    invPending: invoices.filter(i => i.status === 'PENDING' || i.status === 'PARTIAL').length,
    invPaid: invoices.filter(i => i.status === 'PAID').length
  };

  // Total por pagar
  const pendingTotal = invoices.filter(i => i.status === 'PENDING' || i.status === 'PARTIAL').reduce((s, i) => {
    let usd = (i.totalToPay - (i.paidAmount||0));
    if (i.currency === 'VES') {
      const r = currency.getActiveRate();
      usd = r && r.value ? usd / r.value : 0;
    }
    return s + usd;
  }, 0);

  const tabContent = tab === 'pos' ? renderPOTable(pos) : renderInvoiceTable(invoices);

  ui.renderLayout({
    activeModule: 'compras', pageEyebrow: 'Comercial', pageTitle: 'Compras',
    contentHtml: `
      <div class="action-bar">
        <div class="action-bar-left">
          <h2 class="action-bar-title">Compras</h2>
          <span class="action-bar-count">${counts.posActive} OC activas · ${counts.invPending} factura(s) por pagar · $${pendingTotal.toFixed(2)} adeudados</span>
        </div>
      </div>

      <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0;">
        <button class="btn btn-ghost" style="border-radius:0;border-bottom:2px solid ${tab==='pos'?'var(--ink)':'transparent'};color:${tab==='pos'?'var(--ink)':'var(--ink-3)'};" onclick="changeTab('pos')">Órdenes de compra (${pos.length})</button>
        <button class="btn btn-ghost" style="border-radius:0;border-bottom:2px solid ${tab==='invoices'?'var(--ink)':'transparent'};color:${tab==='invoices'?'var(--ink)':'var(--ink-3)'};" onclick="changeTab('invoices')">Facturas (${invoices.length})</button>
      </div>

      ${tab === 'pos' ? `<div class="card mb-24" style="padding:14px 18px;background:#eff6ff;border-color:#bfdbfe;">
        <div style="font-size:12.5px;color:#1e3a8a;line-height:1.5;">
          <strong>📌 Flujo de compras:</strong> Crea una OC → marcala como Enviada → Recibí mercancía (se crean lotes en inventario) → <strong>Crea la factura del proveedor</strong> (recién ahí aparece la deuda en Pagos para que la pagues).
        </div>
      </div>` : ''}

      ${tabContent}

      <!-- Botón abajo -->
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        ${tab === 'pos' ? `<button class="btn btn-primary" onclick="newPO()">${ui.icon('plus')} Nueva OC</button>` : ''}
      </div>
    `
  });
}

function changeTab(t) { tab = t; render(); }

function renderPOTable(pos) {
  if (!pos.length) return `<div class="empty-state"><div class="empty-state-icon">${ui.icon('box')}</div><div class="empty-state-title">Sin órdenes de compra</div><div class="empty-state-text">Crea tu primera OC para empezar a gestionar compras a proveedores.</div><button class="btn btn-primary" onclick="newPO()">${ui.icon('plus')} Nueva OC</button></div>`;
  return `<div class="table-wrap"><table>
    <thead><tr><th>Código</th><th>Proveedor</th><th>Fecha</th><th>Esperada</th><th style="text-align:right;">Total</th><th>Moneda</th><th>Estado</th><th style="text-align:right;width:100px;">Acciones</th></tr></thead>
    <tbody>${pos.map(p => {
      const s = purchases.PO_STATUS[p.status] || { label: p.status, color: 'badge-plain' };
      return `<tr style="cursor:pointer;" onclick="openPO('${p.id}')">
        <td><span class="td-mono td-strong">${p.code}</span></td>
        <td><div class="td-strong">${ui.escape(p.supplierName)}</div><div class="text-muted" style="font-size:11px;">${ui.escape(p.supplierRif||'')}</div></td>
        <td><span class="text-muted">${ui.formatDate(p.issueDate)}</span></td>
        <td><span class="text-muted">${p.expectedDate ? ui.formatDate(p.expectedDate) : '—'}</span></td>
        <td style="text-align:right;"><span class="td-mono td-strong">${currency.format(p.subtotal, p.currency)}</span></td>
        <td><span class="badge ${p.currency==='USD'?'badge-accent':'badge-plain'}">${p.currency}</span></td>
        <td><span class="badge ${s.color}">${s.label}</span></td>
        <td class="td-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openPO('${p.id}')">${ui.icon('edit')}</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderInvoiceTable(invoices) {
  if (!invoices.length) return `<div class="empty-state"><div class="empty-state-title">Sin documentos registrados</div><div class="empty-state-text">Los documentos de proveedor se generan desde una OC recibida.</div></div>`;
  const isGerencial = (typeof auth !== 'undefined' && auth.getActiveMode() === 'gerencial');

  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Código</th>
      <th>Tipo</th>
      <th>N° Factura prov.</th>
      <th>Proveedor</th>
      <th>Fecha</th>
      <th style="text-align:right;">Total ${isGerencial ? 'USD' : 'Bs'}</th>
      ${isGerencial ? `<th style="text-align:right;">Total Bs</th>` : ''}
      <th style="text-align:right;">A pagar</th>
      <th>Estado</th>
      <th style="text-align:right;width:120px;">Acciones</th>
    </tr></thead>
    <tbody>${invoices.map(inv => {
      const s = purchases.INV_STATUS[inv.status] || { label: inv.status, color: 'badge-plain' };
      const isFrozen = !!inv.rateAtFullPayment;
      const isNote = inv.inventoryType === 'NOTA_ENTREGA';

      // Calcular USD y VES según el modo
      let usdValue, vesValue;
      if (isFrozen) {
        usdValue = inv.totalUSD_atFullPayment || 0;
        vesValue = inv.totalVES_atFullPayment || 0;
      } else {
        const conv = currency.toFiscal(inv.total, inv.currency, 'VES');
        const convUSD = currency.toFiscal(inv.total, inv.currency, 'USD');
        usdValue = inv.currency === 'USD' ? inv.total : convUSD.value;
        vesValue = inv.currency === 'VES' ? inv.total : conv.value;
      }
      const lockIcon = isFrozen ? '<span title="Tasa congelada al pagar" style="opacity:0.6;font-size:10px;">🔒</span>' : '';
      const remaining = inv.totalToPay - (inv.paidAmount || 0);

      return `<tr style="cursor:pointer;" onclick="openInvoice('${inv.id}')">
        <td><span class="td-mono td-strong">${inv.code}</span></td>
        <td><span class="badge ${isNote?'badge-warning':'badge-success'}" style="font-size:10px;">${isNote?'📋 Nota':'📄 Factura'}</span></td>
        <td><span class="td-mono">${ui.escape(inv.supplierInvoiceNumber||'—')}</span></td>
        <td>${ui.escape(inv.supplierName)}</td>
        <td><span class="text-muted">${ui.formatDate(inv.issueDate)}</span></td>
        <td style="text-align:right;">
          <span class="td-mono td-strong">${currency.format(isGerencial ? usdValue : vesValue, isGerencial ? 'USD' : 'VES')}</span>
          ${lockIcon}
        </td>
        ${isGerencial ? `<td style="text-align:right;">
          <span class="td-mono text-muted" style="font-size:12px;">${currency.format(vesValue, 'VES')}</span>
        </td>` : ''}
        <td style="text-align:right;">
          <span class="td-mono ${remaining > 0.01 ? 'td-strong' : 'text-muted'}" style="${remaining > 0.01 ? 'color:var(--danger);' : ''}">${currency.format(remaining, inv.currency)}</span>
        </td>
        <td><span class="badge ${s.color}">${s.label}</span></td>
        <td class="td-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openInvoice('${inv.id}')">${ui.icon('edit')}</button>
          ${inv.voucherId ? `<button class="btn-icon" onclick="downloadVoucher('${inv.voucherId}')" title="Descargar comprobante">${ui.icon('download')}</button>` : ''}
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

// ====== CREAR OC ======

function newPO() {
  const suppliers = db.getAll(db.COLLECTIONS.suppliers);
  if (!suppliers.length) { ui.toast('Primero crea un proveedor', 'error'); return; }
  editing = {
    code: db.nextCode(db.COLLECTIONS.purchaseOrders, 'OC'),
    supplierId: '', supplierName: '',
    currency: 'USD', rateType: 'BCV_USD',
    issueDate: new Date().toISOString().slice(0,10),
    expectedDate: '',
    items: [],
    notes: ''
  };
  view = 'poCreate'; render();
}

/** Edita una OC existente (mientras no esté facturada con factura legal) */
function editPO(poId) {
  const po = db.getById(db.COLLECTIONS.purchaseOrders, poId);
  if (!po) { ui.toast('OC no encontrada', 'error'); return; }
  // Verificar si es editable
  const hasFiscalInvoice = po.invoiceId && po.invoiceType === 'FACTURA';
  if (hasFiscalInvoice) { ui.toast('Esta OC ya tiene factura legal asociada y no se puede editar', 'error'); return; }
  if (po.status === 'CANCELLED') { ui.toast('No se puede editar una OC anulada', 'error'); return; }

  // Cargar datos en editing (modo edición)
  editing = {
    id: po.id,
    code: po.code,
    isEditing: true,
    supplierId: po.supplierId,
    supplierName: po.supplierName,
    currency: po.currency,
    rateType: po.rateType,
    issueDate: po.issueDate,
    expectedDate: po.expectedDate || '',
    items: (po.items || []).map(it => ({ ...it })),
    notes: po.notes || ''
  };
  view = 'poCreate'; render();
}

function renderPOCreate() {
  const e = editing;
  const suppliers = db.getAll(db.COLLECTIONS.suppliers);
  const rms = db.getAll(db.COLLECTIONS.rawMaterials);
  const subtotal = e.items.reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0)), 0);

  const itemsHtml = `<div class="card mb-24" style="padding:0;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <div class="card-title" style="font-size:15px;">Ítems</div>
      <button class="btn btn-secondary btn-sm" onclick="addPOItem()">${ui.icon('plus')} Agregar ítem</button>
    </div>
    ${e.items.length ? `<table>
      <thead><tr><th style="width:35%;">Materia prima</th><th style="text-align:right;">Cantidad</th><th>Unidad</th><th style="text-align:right;">Precio unit.</th><th style="text-align:right;">Subtotal</th><th style="width:40px;"></th></tr></thead>
      <tbody>${e.items.map((it, idx) => `<tr>
        <td><select class="select" onchange="updatePOItem(${idx}, 'rawMaterialId', this.value)">
          <option value="">— MP —</option>
          ${rms.map(rm => `<option value="${rm.id}" ${rm.id===it.rawMaterialId?'selected':''}>${ui.escape(rm.code)} · ${ui.escape(rm.name)}</option>`).join('')}
        </select></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.001" value="${it.quantity||''}" style="text-align:right;font-family:var(--font-mono);" oninput="updatePOItemFast(${idx},'quantity',this.value)"></td>
        <td><span class="text-muted" id="po-unit-${idx}">${it.unit||'—'}</span></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.0001" value="${it.unitPrice||''}" style="text-align:right;font-family:var(--font-mono);" oninput="updatePOItemFast(${idx},'unitPrice',this.value)"></td>
        <td style="text-align:right;"><span class="td-mono td-strong" id="po-line-${idx}">${currency.format((it.quantity||0)*(it.unitPrice||0), e.currency)}</span></td>
        <td><button class="btn-icon" onclick="removePOItem(${idx})">${ui.icon('trash')}</button></td>
      </tr>`).join('')}</tbody>
    </table>` : '<div style="padding:32px;text-align:center;color:var(--ink-3);">Sin ítems. Agregá al menos uno.</div>'}
  </div>`;

  ui.renderLayout({
    activeModule: 'compras',
    pageEyebrow: e.isEditing ? 'Editando OC' : 'Nueva OC',
    pageTitle: e.code,
    contentHtml: `
      <div class="card mb-24">
        <div class="card-header"><div class="card-title">Información</div></div>
        <div class="form-grid form-grid-2">
          <div class="field"><label class="field-label">Código</label><input class="input" value="${e.code}" disabled style="font-family:var(--font-mono);"></div>
          <div class="field"><label class="field-label">Proveedor *</label><select class="select" onchange="onSupplierChange(this.value)"><option value="">— Selecciona —</option>${suppliers.map(s => `<option value="${s.id}" ${s.id===e.supplierId?'selected':''}>${ui.escape(s.name)} · ${ui.escape(s.rif||'')}</option>`).join('')}</select></div>
          <div class="field"><label class="field-label">Fecha emisión</label><input class="input" type="date" value="${e.issueDate}" onchange="editing.issueDate=this.value"></div>
          <div class="field"><label class="field-label">Fecha esperada</label><input class="input" type="date" value="${e.expectedDate||''}" onchange="editing.expectedDate=this.value"></div>
          <div class="field"><label class="field-label">Moneda</label><select class="select" onchange="editing.currency=this.value;render()"><option value="USD" ${e.currency==='USD'?'selected':''}>USD ($)</option><option value="VES" ${e.currency==='VES'?'selected':''}>VES (Bs)</option><option value="EUR" ${e.currency==='EUR'?'selected':''}>EUR (€)</option></select></div>
          <div class="field"><label class="field-label">Tasa de referencia</label><select class="select" onchange="editing.rateType=this.value">${currency.getRates().map(r => `<option value="${r.type}" ${r.type===e.rateType?'selected':''}>${r.label} (${r.value.toFixed(2)})</option>`).join('')}</select></div>
        </div>
      </div>

      ${itemsHtml}

      <div class="card mb-24" style="padding:16px 24px;background:var(--accent-soft);border-color:#cdd9c8;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="kpi-label">Subtotal de la OC</div>
          <div id="po-subtotal" style="font-family:var(--font-display);font-size:28px;letter-spacing:-0.02em;">${currency.format(subtotal, e.currency)}</div>
        </div>
      </div>

      <div class="card mb-24">
        <div class="card-header"><div class="card-title">Notas</div></div>
        <textarea class="textarea" onchange="editing.notes=this.value">${ui.escape(e.notes||'')}</textarea>
      </div>

      <!-- Botones abajo -->
      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="cancelEdit()">← Cancelar</button>
        <button class="btn btn-primary" onclick="savePO()">${ui.icon('check')} ${e.isEditing ? 'Guardar cambios' : 'Crear OC'}</button>
      </div>
      <div style="height:40px;"></div>
    `
  });
}

function onSupplierChange(sid) {
  editing.supplierId = sid;
  const s = db.getById(db.COLLECTIONS.suppliers, sid);
  if (s) {
    editing.supplierName = s.name;
    if (s.preferredCurrency) editing.currency = s.preferredCurrency;
  }
  render();
}

function addPOItem() {
  editing.items.push({ rawMaterialId: '', quantity: 0, unit: '', unitPrice: 0 });
  render();
}

function updatePOItem(idx, field, val) {
  if (field === 'quantity' || field === 'unitPrice') val = parseFloat(val) || 0;
  editing.items[idx][field] = val;
  // Si cambió la MP, actualizar nombre y unidad
  if (field === 'rawMaterialId' && val) {
    const rm = db.getById(db.COLLECTIONS.rawMaterials, val);
    if (rm) {
      editing.items[idx].rawMaterialCode = rm.code;
      editing.items[idx].rawMaterialName = rm.name;
      editing.items[idx].unit = rm.unit;
      editing.items[idx].unitPrice = rm.lastCost || 0;
    }
  }
  render();
}

/** Actualiza datos numéricos sin re-renderizar (mantiene el foco en el input) */
function updatePOItemFast(idx, field, val) {
  const num = parseFloat(val) || 0;
  editing.items[idx][field] = num;
  // Actualizar solo el subtotal de la fila y el total general puntualmente
  const item = editing.items[idx];
  const lineEl = document.getElementById(`po-line-${idx}`);
  if (lineEl) lineEl.textContent = currency.format((item.quantity||0) * (item.unitPrice||0), editing.currency);
  const subtotal = editing.items.reduce((s, it) => s + ((parseFloat(it.quantity)||0) * (parseFloat(it.unitPrice)||0)), 0);
  const totalEl = document.getElementById('po-subtotal');
  if (totalEl) totalEl.textContent = currency.format(subtotal, editing.currency);
}

function removePOItem(idx) {
  editing.items.splice(idx, 1);
  render();
}

function cancelEdit() {
  editing = null; receiving = null;
  view = 'list'; render();
}

function savePO() {
  const e = editing;
  if (!e.supplierId) { ui.toast('Selecciona proveedor', 'error'); return; }
  if (!e.items.length) { ui.toast('Agrega al menos un ítem', 'error'); return; }
  for (const it of e.items) {
    if (!it.rawMaterialId || !it.quantity || it.quantity <= 0) { ui.toast('Hay items incompletos', 'error'); return; }
  }

  if (e.isEditing && e.id) {
    // Actualizar OC existente
    try {
      const po = purchases.updatePO(e.id, {
        supplierId: e.supplierId,
        currency: e.currency,
        rateType: e.rateType,
        items: e.items,
        notes: e.notes,
        expectedDate: e.expectedDate
      });
      ui.toast('OC actualizada', 'success');
      selectedId = po.id; view = 'poDetail'; editing = null;
      render();
    } catch (err) {
      ui.toast(err.message, 'error');
    }
  } else {
    // Crear OC nueva
    try {
      const po = purchases.createPO({
        supplierId: e.supplierId, currency: e.currency, rateType: e.rateType,
        items: e.items, notes: e.notes, expectedDate: e.expectedDate
      });
      ui.toast('OC creada', 'success');
      selectedId = po.id; view = 'poDetail'; editing = null;
      render();
    } catch (err) {
      ui.toast(err.message, 'error');
    }
  }
}

// ====== DETALLE OC ======

function openPO(id) { selectedId = id; view = 'poDetail'; render(); }
function backToList() { view = 'list'; selectedId = null; render(); }

function renderPODetail() {
  const po = db.getById(db.COLLECTIONS.purchaseOrders, selectedId);
  if (!po) { backToList(); return; }
  const s = purchases.PO_STATUS[po.status] || { label: po.status, color: 'badge-plain' };

  let actions = '';
  // Permitir editar mientras no haya factura legal asociada
  const hasFiscalInvoice = po.invoiceId && po.invoiceType === 'FACTURA';
  const canEdit = !hasFiscalInvoice && po.status !== 'CANCELLED';
  if (canEdit) {
    actions += `<button class="btn btn-secondary" onclick="editPO('${po.id}')">${ui.icon('edit')} Editar</button>`;
  }
  if (po.status === 'DRAFT') {
    actions += `<button class="btn btn-secondary" onclick="changePOStatus('${po.id}','SENT')">Marcar como enviada</button>`;
  }
  if (po.status === 'SENT' || po.status === 'PARTIAL' || po.status === 'DRAFT') {
    actions += `<button class="btn btn-primary" onclick="newReceipt('${po.id}')">${ui.icon('download')} Recibir mercancía</button>`;
  }
  if ((po.status === 'RECEIVED' || po.status === 'PARTIAL') && !hasFiscalInvoice) {
    actions += `<button class="btn btn-primary" onclick="askInvoiceType('${po.id}')">${ui.icon('plus')} Generar Factura / Nota</button>`;
  }
  if (po.status !== 'CANCELLED' && !hasFiscalInvoice) {
    actions += `<button class="btn btn-danger" onclick="cancelPO('${po.id}')">${ui.icon('x')} Cancelar</button>`;
  }

  const itemsTable = `<table>
    <thead><tr><th>MP</th><th style="text-align:right;">Pedido</th><th style="text-align:right;">Recibido</th><th style="text-align:right;">Pendiente</th><th style="text-align:right;">Precio unit.</th><th style="text-align:right;">Subtotal</th></tr></thead>
    <tbody>${po.items.map(it => {
      const pending = it.quantity - (it.receivedQuantity || 0);
      return `<tr>
        <td><div class="td-strong">${ui.escape(it.rawMaterialName)}</div><div class="text-muted" style="font-size:11px;">${ui.escape(it.rawMaterialCode||'')}</div></td>
        <td style="text-align:right;"><span class="td-mono">${it.quantity.toFixed(3)}</span> <span class="text-muted">${it.unit||''}</span></td>
        <td style="text-align:right;"><span class="td-mono ${(it.receivedQuantity||0)>0?'td-strong':'td-muted'}">${(it.receivedQuantity||0).toFixed(3)}</span></td>
        <td style="text-align:right;"><span class="td-mono ${pending>0?'':'td-muted'}" ${pending>0?'style="color:var(--warning);"':''}>${pending.toFixed(3)}</span></td>
        <td style="text-align:right;"><span class="td-mono">${currency.format(it.unitPrice, po.currency)}</span></td>
        <td style="text-align:right;"><span class="td-mono td-strong">${currency.format(it.subtotal, po.currency)}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;

// ====== RECEPCIÓN ======

function newReceipt(poId) {
  const po = db.getById(db.COLLECTIONS.purchaseOrders, poId);
  if (!po) return;
  const warehouses = db.getAll(db.COLLECTIONS.warehouses);
  const defaultWh = warehouses.find(w => w.isDefault) || warehouses[0];
  receiving = {
    poId, poCode: po.code,
    receiptDate: new Date().toISOString().slice(0,10),
    notes: '',
    items: po.items.map((it, idx) => ({
      poItemIdx: idx,
      rawMaterialName: it.rawMaterialName,
      rawMaterialId: it.rawMaterialId,
      pending: it.quantity - (it.receivedQuantity || 0),
      unit: it.unit,
      quantity: it.quantity - (it.receivedQuantity || 0),  // por defecto recibo todo lo pendiente
      lotNumber: '',
      expiryDate: '',
      warehouseId: defaultWh?.id,
      locationId: ''
    }))
  };
  view = 'receipt'; render();
}

function renderReceipt() {
  const r = receiving;
  const warehouses = db.getAll(db.COLLECTIONS.warehouses);

  const itemsHtml = `<div class="card" style="padding:0;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);"><div class="card-title" style="font-size:15px;">Items a recibir</div><div class="text-muted" style="font-size:12px;margin-top:2px;">Indicá cantidad recibida y datos del lote. Pon 0 si no recibís ahora.</div></div>
    <table>
      <thead><tr><th>MP</th><th style="text-align:right;">Pendiente</th><th style="text-align:right;">A recibir</th><th>Lote prov.</th><th>Vence</th><th>Almacén</th><th>Ubicación</th></tr></thead>
      <tbody>${r.items.map((it, idx) => {
        const locs = inventory.getLocationsForWarehouse(it.warehouseId || warehouses[0]?.id);
        return `<tr>
          <td><div class="td-strong">${ui.escape(it.rawMaterialName)}</div></td>
          <td style="text-align:right;"><span class="td-mono">${it.pending.toFixed(3)}</span> <span class="text-muted">${it.unit}</span></td>
          <td style="text-align:right;"><input class="input" type="number" step="0.001" max="${it.pending}" value="${it.quantity||0}" style="text-align:right;font-family:var(--font-mono);width:120px;" oninput="updateReceiveItem(${idx},'quantity',this.value)"></td>
          <td><input class="input" value="${it.lotNumber||''}" oninput="updateReceiveItem(${idx},'lotNumber',this.value)" placeholder="Nº lote"></td>
          <td><input class="input" type="date" value="${it.expiryDate||''}" oninput="updateReceiveItem(${idx},'expiryDate',this.value)"></td>
          <td><select class="select" onchange="updateReceiveItem(${idx},'warehouseId',this.value);render()">${warehouses.map(w => `<option value="${w.id}" ${w.id===it.warehouseId?'selected':''}>${ui.escape(w.name)}</option>`).join('')}</select></td>
          <td><select class="select" onchange="updateReceiveItem(${idx},'locationId',this.value)"><option value="">—</option>${locs.map(l => `<option value="${l.id}" ${l.id===it.locationId?'selected':''}>${ui.escape(l.code)}</option>`).join('')}</select></td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;

  ui.renderLayout({
    activeModule: 'compras', pageEyebrow: 'Recepción', pageTitle: 'Contra OC ' + r.poCode,
    contentHtml: `
      <div class="card mb-24">
        <div class="form-grid form-grid-2">
          <div class="field"><label class="field-label">Fecha de recepción *</label><input class="input" type="date" value="${r.receiptDate}" onchange="receiving.receiptDate=this.value"></div>
          <div class="field"><label class="field-label">Notas</label><input class="input" value="${ui.escape(r.notes||'')}" onchange="receiving.notes=this.value"></div>
        </div>
      </div>
      ${itemsHtml}
      <div class="card mt-24" style="padding:16px;background:var(--accent-soft);border-color:#cdd9c8;">
        <div style="font-size:12.5px;color:var(--accent-ink);">Al confirmar, se crearán automáticamente los lotes de MP en inventario, se actualizarán los costos de las MPs, y la OC pasará a estado "Recibida" o "Parcial".</div>
      </div>

      <!-- Botones abajo -->
      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="cancelEdit()">← Cancelar</button>
        <button class="btn btn-primary" onclick="saveReceipt()">${ui.icon('check')} Confirmar recepción</button>
      </div>
      <div style="height:40px;"></div>
    `
  });
}

function updateReceiveItem(idx, field, val) {
  if (field === 'quantity') val = Math.max(0, Math.min(receiving.items[idx].pending, parseFloat(val) || 0));
  receiving.items[idx][field] = val;
}

function saveReceipt() {
  const r = receiving;
  const itemsToReceive = r.items.filter(it => it.quantity > 0);
  if (!itemsToReceive.length) { ui.toast('Indica al menos una cantidad a recibir', 'error'); return; }
  try {
    purchases.registerReceipt({
      poId: r.poId,
      receiptDate: r.receiptDate,
      receivedItems: itemsToReceive,
      notes: r.notes
    });
    ui.toast('Recepción registrada · lotes creados', 'success');
    selectedId = r.poId; view = 'poDetail'; receiving = null;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

function newInvoiceFromPO(poId, inventoryType = 'FACTURA') {
  const po = db.getById(db.COLLECTIONS.purchaseOrders, poId);
  if (!po) return;
  const supplier = db.getById(db.COLLECTIONS.suppliers, po.supplierId);
  editing = {
    poId,
    poCode: po.code,
    inventoryType: inventoryType,  // 'FACTURA' | 'NOTA_ENTREGA'
    supplierId: po.supplierId,
    supplierName: po.supplierName,
    supplierRif: po.supplierRif,
    supplierInvoiceNumber: '',
    supplierInvoiceControl: '',
    issueDate: new Date().toISOString().slice(0,10),
    dueDate: '',
    currency: po.currency,
    items: po.items.map(it => ({
      rawMaterialId: it.rawMaterialId,
      rawMaterialName: it.rawMaterialName,
      description: it.rawMaterialName,
      quantity: it.receivedQuantity || it.quantity,
      unit: it.unit,
      unitPrice: it.unitPrice
    })),
    // Si es NE: exenta + sin retenciones
    exempt: inventoryType === 'NOTA_ENTREGA' ? true : false,
    applyIVAWithholding: inventoryType === 'NOTA_ENTREGA' ? false : (supplier?.applyIVAWithholding !== false),
    islrRate: inventoryType === 'NOTA_ENTREGA' ? 0 : (supplier?.islrRate || 0),
    notes: ''
  };
  view = 'invoiceCreate'; render();
}

function renderInvoiceCreate() {

  const subtotal = e.items.reduce((s, it) => s + (parseFloat(it.quantity) * parseFloat(it.unitPrice)), 0);
  const calc = tax.computeInvoiceWithWithholdings({
    subtotal, exempt: e.exempt,
    applyIVAWithholding: e.applyIVAWithholding,
    islrRate: parseFloat(e.islrRate) || 0
  });

  const itemsHtml = `<div class="card mb-24" style="padding:0;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);"><div class="card-title" style="font-size:15px;">Ítems de la factura</div></div>
    <table>
      <thead><tr><th>Descripción</th><th style="text-align:right;">Cantidad</th><th>Unidad</th><th style="text-align:right;">Precio unit.</th><th style="text-align:right;">Subtotal</th></tr></thead>
      <tbody>${e.items.map((it, idx) => `<tr>
        <td><input class="input" value="${ui.escape(it.description||'')}" onchange="updateInvItem(${idx},'description',this.value)"></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.001" value="${it.quantity}" style="text-align:right;font-family:var(--font-mono);" oninput="updateInvItemFast(${idx},'quantity',this.value)"></td>
        <td><span class="text-muted">${it.unit||'—'}</span></td>
        <td style="text-align:right;"><input class="input" type="number" step="0.0001" value="${it.unitPrice}" style="text-align:right;font-family:var(--font-mono);" oninput="updateInvItemFast(${idx},'unitPrice',this.value)"></td>
        <td style="text-align:right;"><span class="td-mono td-strong" id="inv-line-${idx}">${currency.format(it.quantity*it.unitPrice, e.currency)}</span></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;

  ui.renderLayout({
    activeModule: 'compras',
    pageEyebrow: e.inventoryType === 'NOTA_ENTREGA' ? 'Nueva Nota de Entrega' : 'Nueva factura',
    pageTitle: e.poCode ? (e.inventoryType === 'NOTA_ENTREGA' ? 'Nota de Entrega de OC ' : 'Factura de OC ') + e.poCode : (e.inventoryType === 'NOTA_ENTREGA' ? 'Nueva Nota de Entrega' : 'Nueva factura'),
    contentHtml: `
      ${e.inventoryType === 'NOTA_ENTREGA' ? `
        <div class="card mb-24" style="padding:14px 18px;background:#fef3c7;border-color:#fcd34d;">
          <div style="font-size:13px;color:#92400e;line-height:1.5;">
            <strong>📋 Nota de Entrega:</strong> Sin número fiscal, sin IVA ni retenciones. NO entrará al Libro de Compras (SENIAT). Sí afectará el saldo al pagar.
            Cuando recibas la factura legal del proveedor, podrás convertir esta NE a Factura.
          </div>
        </div>
      ` : ''}

      <div class="card mb-24">
        <div class="card-header"><div class="card-title">${e.inventoryType === 'NOTA_ENTREGA' ? 'Datos de la nota' : 'Datos de la factura del proveedor'}</div></div>
        <div class="form-grid form-grid-2">
          <div class="field"><label class="field-label">Proveedor</label><input class="input" value="${ui.escape(e.supplierName)}" disabled></div>
          <div class="field"><label class="field-label">RIF</label><input class="input" value="${ui.escape(e.supplierRif||'')}" disabled></div>
          ${e.inventoryType !== 'NOTA_ENTREGA' ? `
            <div class="field"><label class="field-label">N° Factura del proveedor *</label><input class="input" value="${ui.escape(e.supplierInvoiceNumber||'')}" onchange="editing.supplierInvoiceNumber=this.value" placeholder="Ej: 00001234"></div>
            <div class="field"><label class="field-label">N° de Control *</label><input class="input" value="${ui.escape(e.supplierInvoiceControl||'')}" onchange="editing.supplierInvoiceControl=this.value" placeholder="Ej: 00-12345678"></div>
          ` : ''}
          <div class="field"><label class="field-label">Fecha emisión *</label><input class="input" type="date" value="${e.issueDate}" onchange="editing.issueDate=this.value"></div>
          <div class="field"><label class="field-label">Vencimiento</label><input class="input" type="date" value="${e.dueDate||''}" onchange="editing.dueDate=this.value"></div>

              <div class="checkbox-row"><input type="checkbox" id="exempt-cb" ${e.exempt?'checked':''} onchange="editing.exempt=this.checked;render()"><label for="exempt-cb" style="font-size:13px;">Operación exenta de IVA</label></div>
            </div>
            ${!e.exempt ? `
              <div class="field" style="grid-column:1/-1;">

              </div>

            <div class="field"><label class="field-label">% Retención ISLR</label><input class="input" type="number" step="0.01" value="${e.islrRate||0}" onchange="editing.islrRate=this.value;render()"><div class="field-hint">0 si no aplica</div></div>
          </div>
        </div>
      ` : ''}

      <!-- Resumen fiscal -->
      <div class="card mb-24" style="padding:0;" id="inv-summary-card">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);"><div class="card-title" style="font-size:15px;">Resumen</div></div>

      <!-- Botones abajo -->
      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">

      </div>

    `
  });
}

function renderInvSummary(calc, e) {
  return [
    ['Subtotal', currency.format(calc.subtotal, e.currency), false],
    [e.exempt ? 'Exento de IVA' : `IVA ${calc.ivaRate}%`, currency.format(calc.ivaAmount, e.currency), false],
    ['Total facturado', currency.format(calc.total, e.currency), true],
    ...(calc.ivaWithheld > 0 ? [[`(-) Retención IVA ${calc.ivaWithholdingRate}%`, '−' + currency.format(calc.ivaWithheld, e.currency), false]] : []),
    ...(calc.islrWithheld > 0 ? [[`(-) Retención ISLR ${calc.islrRate}%`, '−' + currency.format(calc.islrWithheld, e.currency), false]] : []),
    ['Total a pagar al proveedor', currency.format(calc.totalToPay, e.currency), true, true]
  ].map(([label, val, strong, accent]) => `
    <div class="list-row" style="grid-template-columns:1fr auto;border:none;padding:10px 0;${accent?'border-top:1px solid var(--border);background:var(--accent-soft);margin:0 -20px;padding:14px 20px;':''}">
      <span style="font-size:13px;${strong?'font-weight:600;':''}${accent?'color:var(--accent-ink);font-weight:600;':''}">${label}</span>
      <span class="${strong?'td-mono td-strong':'td-mono'}" style="font-size:14px;${accent?'color:var(--accent-ink);font-size:18px;font-family:var(--font-display);font-style:italic;':''}">${val}</span>
    </div>
  `).join('');
}

function updateInvItem(idx, field, val) {
  if (field === 'quantity' || field === 'unitPrice') val = parseFloat(val) || 0;
  editing.items[idx][field] = val;
}

/** Actualiza item de factura sin re-renderizar el formulario completo */
function updateInvItemFast(idx, field, val) {
  const num = parseFloat(val) || 0;
  editing.items[idx][field] = num;
  // Actualizar subtotal de la línea
  const item = editing.items[idx];
  const lineEl = document.getElementById(`inv-line-${idx}`);
  if (lineEl) lineEl.textContent = currency.format((item.quantity||0) * (item.unitPrice||0), editing.currency);
  // Recalcular totales y actualizar el resumen
  const subtotal = editing.items.reduce((s, it) => s + (parseFloat(it.quantity) * parseFloat(it.unitPrice)), 0);
  const calc = tax.computeInvoiceWithWithholdings({
    subtotal, exempt: editing.exempt,
    applyIVAWithholding: editing.applyIVAWithholding,
    islrRate: parseFloat(editing.islrRate) || 0
  });
  const summaryBody = document.getElementById('inv-summary-body');
  if (summaryBody) summaryBody.innerHTML = renderInvSummary(calc, editing);
}

function saveInvoice() {
  const e = editing;
  const isNote = e.inventoryType === 'NOTA_ENTREGA';
  // Validaciones según tipo
  if (!isNote) {
    if (!e.supplierInvoiceNumber || !e.supplierInvoiceControl) {
      ui.toast('Número de factura y control son obligatorios', 'error');
      return;
    }
  }
  if (!e.items || !e.items.length) { ui.toast('Debe tener al menos un ítem', 'error'); return; }
  try {
    const inv = purchases.createSupplierInvoice({
      poId: e.poId,
      inventoryType: e.inventoryType || 'FACTURA',
      supplierInvoiceNumber: e.supplierInvoiceNumber,
      supplierInvoiceControl: e.supplierInvoiceControl,
      issueDate: e.issueDate,
      dueDate: e.dueDate,
      items: e.items,
      exempt: e.exempt,
      applyIVAWithholding: e.applyIVAWithholding,
      islrRate: e.islrRate,
      notes: e.notes
    });
    const docName = isNote ? 'Nota de Entrega registrada' : 'Factura registrada';
    ui.toast(docName + (inv.voucherId ? ' · comprobante de retención generado' : ''), 'success');
    selectedId = inv.id; view = 'invoiceDetail'; editing = null;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

/** Convierte una Nota de Entrega a Factura */
function convertNEToFactura(noteId) {
  const note = db.getById(db.COLLECTIONS.supplierInvoices, noteId);
  if (!note) return;
  const supplier = db.getById(db.COLLECTIONS.suppliers, note.supplierId);
  const cfg = db.getById(db.COLLECTIONS.config, 'main') || {};

  // Pre-cargar datos del proveedor
  const defaultIVAWith = supplier?.applyIVAWithholding !== false;
  const defaultIslr = supplier?.islrRate || 0;

  ui.openModal({
    title: `Convertir ${note.code} a Factura`,
    body: `
      <div class="card mb-24" style="padding:14px 18px;background:#dbeafe;border-color:#93c5fd;">

        </div>
      </div>
      <div class="form-grid form-grid-2">
        <div class="field"><label class="field-label">N° Factura del proveedor *</label><input id="conv-num" class="input" placeholder="Ej: 00001234"></div>
        <div class="field"><label class="field-label">N° de Control *</label><input id="conv-ctrl" class="input" placeholder="Ej: 00-12345678"></div>
        <div class="field" style="grid-column:1/-1;">
          <div class="checkbox-row"><input type="checkbox" id="conv-exempt"><label for="conv-exempt" style="font-size:13px;">Operación exenta de IVA</label></div>
        </div>
        <div class="field" style="grid-column:1/-1;">
          <div class="checkbox-row"><input type="checkbox" id="conv-ret-iva" ${defaultIVAWith?'checked':''}><label for="conv-ret-iva" style="font-size:13px;">Aplicar retención de IVA (${cfg.ivaWithholdingRate||75}% como agente)</label></div>
        </div>
        <div class="field"><label class="field-label">% Retención ISLR</label><input id="conv-islr" class="input" type="number" step="0.01" value="${defaultIslr}"></div>
      </div>
    `,
    footer: `
      <button class="btn btn-secondary" onclick="ui.closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doConvertNE('${noteId}')">${ui.icon('check')} Convertir a Factura</button>
    `
  });
}

function doConvertNE(noteId) {
  const num = document.getElementById('conv-num')?.value?.trim();
  const ctrl = document.getElementById('conv-ctrl')?.value?.trim();
  const exempt = document.getElementById('conv-exempt')?.checked;
  const applyIVAWith = document.getElementById('conv-ret-iva')?.checked;
  const islr = parseFloat(document.getElementById('conv-islr')?.value) || 0;
  if (!num || !ctrl) { ui.toast('Número de factura y control son obligatorios', 'error'); return; }
  try {
    const result = purchases.convertNoteToInvoice(noteId, {
      supplierInvoiceNumber: num,
      supplierInvoiceControl: ctrl,
      exempt,
      applyIVAWithholding: applyIVAWith,
      islrRate: islr
    });
    ui.closeModal();
    ui.toast(`Convertida a Factura ${result.code}`, 'success');
    selectedId = result.id;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('es-VE', { day: '2-digit', month: 'long', year: 'numeric' }) : '—'; }
function formatDateTime(iso) { return iso ? new Date(iso).toLocaleString('es-VE', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—'; }
function formatMoney(amount, ccy) {
  const n = parseFloat(amount) || 0;

}
