<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagos · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script type="module" src="../assets/js/firebase-init.js"></script>
<script src="../assets/js/module-init-v2.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/inventory.js"></script>
<script src="../assets/js/formulas.js"></script>
<script src="../assets/js/purchases.js"></script>
<script src="../assets/js/sales.js"></script>
<script src="../assets/js/payments.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
moduleInit('pagos').then(async (ok) => {
if (!ok) return;

let tab = 'cxp';        // cxp | cxc | history
let creating = null;     // borrador de pago

function render() {
  if (creating) return renderCreate();

  // Auto-ejecutar acciones por query string (ej: ?invoice=xxx desde compras)
  const params = new URLSearchParams(window.location.search);
  const invoiceParam = params.get('invoice');
  const docParam = params.get('doc');
  if (invoiceParam) {
    window.history.replaceState({}, '', window.location.pathname);
    setTimeout(() => newPaymentForInvoice(invoiceParam), 50);
    return;
  }
  if (docParam) {
    window.history.replaceState({}, '', window.location.pathname);
    setTimeout(() => newPaymentForDoc(docParam), 50);
    return;
  }

  return renderList();
}

function renderList() {
  // Cuentas por pagar (facturas proveedor pendientes)
  const supplierInvoices = db.getAll(db.COLLECTIONS.supplierInvoices)
    .filter(i => i.status !== 'CANCELLED' && (i.totalToPay - (i.paidAmount||0)) > 0.01)
    .sort((a,b) => (a.dueDate||a.issueDate||'').localeCompare(b.dueDate||b.issueDate||''));

  // Cuentas por cobrar (facturas venta pendientes)
  const salesDocs = db.getAll(db.COLLECTIONS.salesOrders)
    .filter(d => !d.cancelled && d.type === 'FACTURA' && (d.total - (d.paidAmount||0)) > 0.01)
    .sort((a,b) => (a.dueDate||a.issueDate||'').localeCompare(b.dueDate||b.issueDate||''));

  // Histórico de pagos
  const allPayments = db.getAll(db.COLLECTIONS.payments).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  // Totales POR MONEDA (más útil que solo USD si no hay tasa)
  const cxpByCcy = { VES: 0, USD: 0, EUR: 0 };
  supplierInvoices.forEach(i => {
    const remaining = i.totalToPay - (i.paidAmount||0);
    cxpByCcy[i.currency] = (cxpByCcy[i.currency] || 0) + remaining;
  });
  const cxcByCcy = { VES: 0, USD: 0, EUR: 0 };
  salesDocs.forEach(d => {
    const remaining = d.total - (d.paidAmount||0);
    cxcByCcy[d.currency] = (cxcByCcy[d.currency] || 0) + remaining;
  });

  // Saldo bancario por moneda — modo Gerencial muestra todas, Contable solo empresa
  const isGerencialMode = (typeof auth !== 'undefined' && auth.getActiveMode && auth.getActiveMode() === 'gerencial');
  const bankByCcy = { VES: 0, USD: 0, EUR: 0 };
  db.getAll(db.COLLECTIONS.bankAccounts)
    .filter(a => a.active !== false)
    .filter(a => isGerencialMode || a.countsForFiscal !== false)
    .forEach(a => {
      bankByCcy[a.currency] = (bankByCcy[a.currency] || 0) + (a.balance || 0);
    });

  // Helper: KPI consolidado en moneda del modo activo (Gerencial USD / Contable VES)
  const renderMultiKPI = (byCcy, color) => {
    let total = 0;
    Object.entries(byCcy).forEach(([ccy, amount]) => {
      if (amount > 0.01) total += currency.toDisplay(amount, ccy);
    });
    if (total < 0.01) return `<div class="kpi-value" style="color:${color};">0,00</div>`;
    return `<div class="kpi-value" style="color:${color};font-size:24px;">${currency.format(total, currency.getModeCurrency())}</div>`;
  };

  // Vencidas
  const today = new Date().toISOString().slice(0,10);
  const cxpOverdue = supplierInvoices.filter(i => i.dueDate && i.dueDate < today).length;
  const cxcOverdue = salesDocs.filter(d => d.dueDate && d.dueDate < today).length;

  let tabContent;
  if (tab === 'cxp') tabContent = renderCXPTable(supplierInvoices);
  else if (tab === 'cxc') tabContent = renderCXCTable(salesDocs);
  else tabContent = renderHistoryTable(allPayments);

  ui.renderLayout({
    activeModule: 'pagos', pageEyebrow: 'Comercial', pageTitle: 'Pagos',
    contentHtml: `
      <div class="action-bar">
        <div class="action-bar-left">
          <h2 class="action-bar-title">Pagos</h2>
          <span class="action-bar-count">Cuentas por pagar y por cobrar</span>
        </div>
        <div class="action-bar-right">
          <button class="btn btn-secondary btn-sm" onclick="recalcStatuses()" title="Recalcula el estado de las facturas según los pagos reales registrados">${ui.icon('refresh')} Recalcular estados</button>
        </div>
      </div>

      <div class="grid grid-4 mb-24">
        <div class="kpi">
          <div class="kpi-label">Por pagar</div>
          ${renderMultiKPI(cxpByCcy, 'var(--danger)')}
          <div class="kpi-value-sub">${supplierInvoices.length} factura${supplierInvoices.length!==1?'s':''}${cxpOverdue?` · ${cxpOverdue} vencida${cxpOverdue!==1?'s':''}`:''}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Por cobrar</div>
          ${renderMultiKPI(cxcByCcy, 'var(--accent-ink)')}
          <div class="kpi-value-sub">${salesDocs.length} factura${salesDocs.length!==1?'s':''}${cxcOverdue?` · ${cxcOverdue} vencida${cxcOverdue!==1?'s':''}`:''}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Disponible en bancos</div>
          ${renderMultiKPI(bankByCcy, 'var(--success)')}
          <div class="kpi-value-sub">${db.getAll(db.COLLECTIONS.bankAccounts).filter(a=>a.active!==false).length} cuenta(s)</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Pagos registrados</div>
          <div class="kpi-value">${allPayments.length}</div>
          <div class="kpi-value-sub">total histórico</div>
        </div>
      </div>

      <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0;">
        <button class="btn btn-ghost" style="border-radius:0;border-bottom:2px solid ${tab==='cxp'?'var(--ink)':'transparent'};color:${tab==='cxp'?'var(--ink)':'var(--ink-3)'};" onclick="changeTab('cxp')">Por pagar (${supplierInvoices.length})</button>
        <button class="btn btn-ghost" style="border-radius:0;border-bottom:2px solid ${tab==='cxc'?'var(--ink)':'transparent'};color:${tab==='cxc'?'var(--ink)':'var(--ink-3)'};" onclick="changeTab('cxc')">Por cobrar (${salesDocs.length})</button>
        <button class="btn btn-ghost" style="border-radius:0;border-bottom:2px solid ${tab==='history'?'var(--ink)':'transparent'};color:${tab==='history'?'var(--ink)':'var(--ink-3)'};" onclick="changeTab('history')">Historial (${allPayments.length})</button>
      </div>

      ${tabContent}
    `
  });
}

function changeTab(t) { tab = t; render(); }

function renderCXPTable(invoices) {
  if (!invoices.length) return '<div class="empty-state"><div class="empty-state-title">Sin facturas pendientes</div><div class="empty-state-text">Todas las facturas de proveedores están pagadas.</div></div>';
  const today = new Date().toISOString().slice(0,10);
  return `<div class="table-wrap"><table>
    <thead><tr><th>Factura</th><th>Proveedor</th><th>Emitida</th><th>Vence</th><th style="text-align:right;">Total</th><th style="text-align:right;">Pagado</th><th style="text-align:right;">Pendiente</th><th>Moneda</th><th style="text-align:right;width:200px;">Acciones</th></tr></thead>
    <tbody>${invoices.map(i => {
      const remaining = i.totalToPay - (i.paidAmount||0);
      const overdue = i.dueDate && i.dueDate < today;
      const dueClass = overdue ? 'badge-danger' : 'badge-plain';
      const supplier = db.getById(db.COLLECTIONS.suppliers, i.supplierId);
      const hasPhone = supplier && (supplier.whatsapp || supplier.phone);
      const notifyUrl = `notificaciones.html?quickSend=1&type=supplier&id=${i.supplierId}&template=RECORDATORIO_PAGO_PROVEEDOR&docId=${i.id}`;
      return `<tr>
        <td><span class="td-mono td-strong">${i.code}</span><div class="text-muted" style="font-size:11px;">${ui.escape(i.supplierInvoiceNumber||'')}</div></td>
        <td>${ui.escape(i.supplierName)}</td>
        <td><span class="text-muted">${ui.formatDate(i.issueDate)}</span></td>
        <td>${i.dueDate ? `<span class="badge ${dueClass}">${ui.formatDate(i.dueDate)}</span>` : '<span class="td-muted">—</span>'}</td>
        <td style="text-align:right;"><span class="td-mono">${currency.format(i.totalToPay, i.currency)}</span></td>
        <td style="text-align:right;"><span class="td-mono">${currency.format(i.paidAmount||0, i.currency)}</span></td>
        <td style="text-align:right;"><span class="td-mono td-strong">${currency.format(remaining, i.currency)}</span></td>
        <td><span class="badge ${i.currency==='USD'?'badge-accent':'badge-plain'}">${i.currency}</span></td>
        <td class="td-actions" style="display:flex;gap:4px;justify-content:flex-end;">
          ${hasPhone ? `<a href="${notifyUrl}" class="btn btn-secondary btn-sm" title="Enviar recordatorio por WhatsApp" style="font-size:11px;padding:4px 8px;">📱 Avisar</a>` : ''}
          <button class="btn btn-primary btn-sm" onclick="newPaymentForInvoice('${i.id}')">Registrar pago</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderCXCTable(docs) {
  if (!docs.length) return '<div class="empty-state"><div class="empty-state-title">Sin facturas por cobrar</div><div class="empty-state-text">Todas tus facturas de venta están cobradas.</div></div>';
  const today = new Date().toISOString().slice(0,10);
  return `<div class="table-wrap"><table>
    <thead><tr><th>Factura</th><th>Cliente</th><th>Emitida</th><th>Vence</th><th style="text-align:right;">Total</th><th style="text-align:right;">Cobrado</th><th style="text-align:right;">Pendiente</th><th>Moneda</th><th style="text-align:right;width:200px;">Acciones</th></tr></thead>
    <tbody>${docs.map(d => {
      const remaining = d.total - (d.paidAmount||0);
      const overdue = d.dueDate && d.dueDate < today;
      const dueClass = overdue ? 'badge-danger' : 'badge-plain';
      const customer = db.getById(db.COLLECTIONS.customers, d.customerId);
      const hasPhone = customer && (customer.whatsapp || customer.phone);
      const notifyUrl = `notificaciones.html?quickSend=1&type=customer&id=${d.customerId}&template=COBRO_PENDIENTE_CLIENTE&docId=${d.id}`;
      return `<tr>
        <td><span class="td-mono td-strong">${d.invoiceNumber||d.code}</span><div class="text-muted" style="font-size:11px;">Ctrl: ${d.controlNumber||'—'}</div></td>
        <td>${ui.escape(d.customerName)}</td>
        <td><span class="text-muted">${ui.formatDate(d.issueDate)}</span></td>
        <td>${d.dueDate ? `<span class="badge ${dueClass}">${ui.formatDate(d.dueDate)}</span>` : '<span class="td-muted">—</span>'}</td>
        <td style="text-align:right;"><span class="td-mono">${currency.format(d.total, d.currency)}</span></td>
        <td style="text-align:right;"><span class="td-mono">${currency.format(d.paidAmount||0, d.currency)}</span></td>
        <td style="text-align:right;"><span class="td-mono td-strong">${currency.format(remaining, d.currency)}</span></td>
        <td><span class="badge ${d.currency==='USD'?'badge-accent':'badge-plain'}">${d.currency}</span></td>
        <td class="td-actions" style="display:flex;gap:4px;justify-content:flex-end;">
          ${hasPhone ? `<a href="${notifyUrl}" class="btn btn-secondary btn-sm" title="Enviar recordatorio por WhatsApp" style="font-size:11px;padding:4px 8px;">📱 Avisar</a>` : ''}
          <button class="btn btn-primary btn-sm" onclick="newPaymentForDoc('${d.id}')">Registrar cobro</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderHistoryTable(payments) {
  if (!payments.length) return '<div class="empty-state"><div class="empty-state-title">Sin pagos registrados</div></div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Código</th><th>Tipo</th><th>Fecha</th><th>Contraparte</th><th>Documento</th><th>Método</th><th>Cuenta</th><th style="text-align:right;">Monto</th><th>Referencia</th></tr></thead>
    <tbody>${payments.map(p => `<tr>
      <td><span class="td-mono td-strong">${p.code}</span></td>
      <td><span class="badge ${p.direction==='IN'?'badge-paid':'badge-overdue'}">${p.direction==='IN'?'Cobro':'Pago'}</span></td>
      <td><span class="text-muted">${ui.formatDate(p.date)}</span></td>
      <td>${ui.escape(p.counterpartyName||'—')}</td>
      <td><span class="td-mono">${ui.escape(p.relatedDocCode||'—')}</span></td>
      <td>${ui.escape(p.paymentMethodName||'—')}</td>
      <td><span class="text-muted" style="font-size:12px;">${p.bankAccountId ? ui.escape(db.getById(db.COLLECTIONS.bankAccounts, p.bankAccountId)?.name||'—') : '—'}</span></td>
      <td style="text-align:right;"><span class="td-mono td-strong" style="color:${p.direction==='IN'?'var(--success)':'var(--danger)'};">${p.direction==='IN'?'+':'−'}${currency.format(p.amount, p.currency)}</span>${p.amountInDocCurrency !== p.amount ? `<div class="text-muted" style="font-size:11px;">≈ ${currency.format(p.amountInDocCurrency, p.docCurrency)}</div>` : ''}</td>
      <td><span class="text-muted" style="font-size:12px;">${ui.escape(p.reference||'—')}</span></td>
    </tr>`).join('')}</tbody></table></div>`;
}

// ====== CREAR PAGO ======

function newPaymentForInvoice(invoiceId) {
  const inv = db.getById(db.COLLECTIONS.supplierInvoices, invoiceId);
  if (!inv) { ui.toast('Factura no encontrada', 'error'); return; }
  const remaining = inv.totalToPay - (inv.paidAmount||0);
  const bcv = currency.getRate('BCV_USD');
  creating = {
    direction: 'OUT',
    relatedDocId: inv.id,
    relatedDocCode: inv.code,
    relatedDocLabel: `${inv.code} · ${inv.supplierInvoiceNumber||''}`,
    counterpartyId: inv.supplierId,
    counterpartyName: inv.supplierName,
    docCurrency: inv.currency,
    docTotal: inv.totalToPay,
    docPaid: inv.paidAmount || 0,
    docRemaining: remaining,
    currency: inv.currency,
    amount: remaining,
    amountInDocCurrency: remaining,
    rateUsed: null,
    // === Tasa congelada del pago (BCV de hoy) ===
    rateAtPayment: bcv?.value || 0,
    rateTypeAtPayment: 'BCV_USD',
    // === Conversión cruzada ===
    conversionRate: bcv?.value || 0,
    conversionRateType: 'BCV_USD',
    conversionRateLabel: 'BCV de hoy',
    conversionMode: 'apply_full', // 'apply_full' | 'apply_at_rate'
    paymentMethodId: '',
    paymentMethodName: '',
    bankAccountId: '',
    reference: '',
    date: new Date().toISOString().slice(0,10),
    notes: ''
  };
  render();
}

function newPaymentForDoc(docId) {
  const doc = db.getById(db.COLLECTIONS.salesOrders, docId);
  if (!doc) { ui.toast('Documento no encontrado', 'error'); return; }
  const remaining = doc.total - (doc.paidAmount||0);
  const bcv = currency.getRate('BCV_USD');
  creating = {
    direction: 'IN',
    relatedDocId: doc.id,
    relatedDocCode: doc.invoiceNumber || doc.code,
    relatedDocLabel: `${doc.invoiceNumber||doc.code} · ${doc.customerName}`,
    counterpartyId: doc.customerId,
    counterpartyName: doc.customerName,
    docCurrency: doc.currency,
    docTotal: doc.total,
    docPaid: doc.paidAmount || 0,
    docRemaining: remaining,
    currency: doc.currency,
    amount: remaining,
    amountInDocCurrency: remaining,
    rateUsed: null,
    rateAtPayment: bcv?.value || 0,
    rateTypeAtPayment: 'BCV_USD',
    conversionRate: bcv?.value || 0,
    conversionRateType: 'BCV_USD',
    conversionRateLabel: 'BCV de hoy',
    conversionMode: 'apply_full',
    paymentMethodId: '',
    paymentMethodName: '',
    bankAccountId: '',
    reference: '',
    date: new Date().toISOString().slice(0,10),
    notes: ''
  };
  render();
}

function renderCreate() {
  const c = creating;
  const methods = db.getAll(db.COLLECTIONS.paymentMethods).filter(m => m.active !== false);
  const accounts = db.getAll(db.COLLECTIONS.bankAccounts).filter(a => a.active !== false);
  const selectedMethod = methods.find(m => m.id === c.paymentMethodId);

  // En modo Contable solo mostrar cuentas empresa; Gerencial todas
  const isGerencial = (typeof auth !== 'undefined' && auth.getActiveMode() === 'gerencial');
  const visibleAccounts = accounts.filter(a => isGerencial || a.countsForFiscal !== false);

  // === Cálculo de conversión cruzada ===
  const isCrossCurrency = c.currency !== c.docCurrency;

  // Tasas disponibles para conversión
  const allRates = currency.getRates().filter(r => r.value > 0);

  if (isCrossCurrency) {
    // Calcular el equivalente en moneda del documento según la tasa elegida
    const rate = parseFloat(c.conversionRate) || 0;
    const amt = parseFloat(c.amount) || 0;
    let amountInDoc = 0;
    if (c.docCurrency === 'VES' && c.currency === 'USD') {
      amountInDoc = amt * rate;
    } else if (c.docCurrency === 'USD' && c.currency === 'VES') {
      amountInDoc = rate > 0 ? amt / rate : 0;
    } else if (c.docCurrency === 'VES' && c.currency === 'EUR') {
      const eurRate = currency.getRate('BCV_EUR');
      amountInDoc = eurRate?.value ? amt * eurRate.value : 0;
    } else if (c.docCurrency === 'EUR' && c.currency === 'VES') {
      const eurRate = currency.getRate('BCV_EUR');
      amountInDoc = eurRate?.value ? amt / eurRate.value : 0;
    } else if (c.docCurrency === 'USD' && c.currency === 'EUR') {
      const eurRate = currency.getRate('BCV_EUR');
      const inVES = eurRate?.value ? amt * eurRate.value : 0;
      amountInDoc = rate > 0 ? inVES / rate : 0;
    } else if (c.docCurrency === 'EUR' && c.currency === 'USD') {
      const eurRate = currency.getRate('BCV_EUR');
      const inVES = amt * rate;
      amountInDoc = eurRate?.value ? inVES / eurRate.value : 0;
    }

    if (c.conversionMode === 'apply_full') {
      // Aplica todo lo que dijo el usuario al pendiente (asume que se acordó esa conversión)
      c.amountInDocCurrency = Math.min(Math.round(amountInDoc * 100) / 100, c.docRemaining);
    } else {
      // Aplica el monto exacto convertido (puede dejar saldo si la tasa está más baja)
      c.amountInDocCurrency = Math.round(amountInDoc * 100) / 100;
    }
  } else {
    c.amountInDocCurrency = parseFloat(c.amount) || 0;
  }

  // === HTML conversión cruzada ===
  let conversionPanelHtml = '';
  if (isCrossCurrency) {
    const equivAtSelectedRate = c.amountInDocCurrency;
    const remainingAfter = Math.round((c.docRemaining - equivAtSelectedRate) * 100) / 100;

    conversionPanelHtml = `
      <div class="card mb-24" style="background:#fef3c7;border:1px solid #fcd34d;padding:16px;">
        <div style="font-weight:600;font-size:13px;color:#92400e;margin-bottom:12px;">⚠️ Conversión cruzada detectada</div>
        <p class="text-muted" style="font-size:12px;margin-bottom:14px;">
          Estás ${c.direction==='OUT'?'pagando':'cobrando'} en <strong>${c.currency}</strong> pero la factura es en <strong>${c.docCurrency}</strong>. Elegí la tasa de conversión:
        </p>

        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
          ${allRates.filter(r => isRateApplicable(r.type, c.currency, c.docCurrency)).map(r => `
            <label class="checkbox-row" style="padding:10px 14px;background:white;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:10px;${c.conversionRateType===r.type && !c.useCustomRate?'border-color:var(--accent);background:#f3f6f0;':''}">
              <input type="radio" name="convrate" ${c.conversionRateType===r.type && !c.useCustomRate?'checked':''} onchange="selectConversionRate('${r.type}', ${r.value})">
              <div style="flex:1;">
                <div style="font-weight:600;font-size:13px;">${r.label} · ${r.value.toLocaleString('es-VE',{maximumFractionDigits:4})}</div>
                <div class="text-muted" style="font-size:11px;">Actualizado: ${r.updatedDate || '—'}</div>
              </div>
            </label>
          `).join('')}
          <label class="checkbox-row" style="padding:10px 14px;background:white;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:10px;${c.useCustomRate?'border-color:var(--accent);background:#f3f6f0;':''}">
            <input type="radio" name="convrate" ${c.useCustomRate?'checked':''} onchange="useCustomRate()">
            <div style="flex:1;">
              <div style="font-weight:600;font-size:13px;">Personalizada</div>
              ${c.useCustomRate ? `<input type="number" step="0.0001" class="input" style="margin-top:6px;" value="${c.conversionRate}" oninput="updateCustomRate(this.value)" placeholder="Ej: 35.5">` : `<div class="text-muted" style="font-size:11px;">Para Zelle, P2P privado, acuerdo especial...</div>`}
            </div>
          </label>
        </div>

        <div style="padding:12px;background:white;border-radius:6px;border:1px solid var(--border);">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:center;font-size:12px;">
            <div>
              <div class="text-muted" style="font-size:11px;">Monto del ${c.direction==='OUT'?'pago':'cobro'}</div>
              <div class="td-mono td-strong" style="font-size:15px;">${currency.format(c.amount, c.currency)}</div>
            </div>
            <div style="text-align:center;">
              <div class="text-muted" style="font-size:11px;">Tasa</div>
              <div class="td-mono td-strong" style="font-size:15px;">${(parseFloat(c.conversionRate)||0).toLocaleString('es-VE',{maximumFractionDigits:4})}</div>
            </div>
            <div style="text-align:right;">
              <div class="text-muted" style="font-size:11px;">Equivale a</div>
              <div class="td-mono td-strong" style="font-size:15px;color:var(--accent-ink);">${currency.format(equivAtSelectedRate, c.docCurrency)}</div>
            </div>
          </div>
        </div>

        <div style="margin-top:14px;padding:12px;background:white;border-radius:6px;border:1px solid var(--border);">
          <div style="font-weight:600;font-size:12px;margin-bottom:8px;">¿Cómo aplicar este ${c.direction==='OUT'?'pago':'cobro'}?</div>
          <label style="display:flex;align-items:start;gap:8px;padding:6px 0;cursor:pointer;font-size:13px;">
            <input type="radio" name="convmode" value="apply_full" ${c.conversionMode==='apply_full'?'checked':''} onchange="creating.conversionMode='apply_full';render();" style="margin-top:3px;">
            <div>
              <strong>Aplicar todo y cerrar la factura</strong>
              <div class="text-muted" style="font-size:11px;">Acordaste esa conversión con la otra parte. Aplica ${currency.format(c.amount, c.currency)} = ${currency.format(equivAtSelectedRate, c.docCurrency)} y descuenta de la deuda. Si fuera mayor al pendiente, se ajusta al pendiente.</div>
            </div>
          </label>
          <label style="display:flex;align-items:start;gap:8px;padding:6px 0;cursor:pointer;font-size:13px;">
            <input type="radio" name="convmode" value="apply_at_rate" ${c.conversionMode==='apply_at_rate'?'checked':''} onchange="creating.conversionMode='apply_at_rate';render();" style="margin-top:3px;">
            <div>
              <strong>Aplicar solo lo que da la tasa exacta</strong>
              <div class="text-muted" style="font-size:11px;">Si queda saldo, queda pendiente. Útil cuando la tasa cambió y querés ajuste preciso.</div>
            </div>
          </label>
        </div>
      </div>
    `;
  }

  ui.renderLayout({
    activeModule: 'pagos', pageEyebrow: c.direction === 'OUT' ? 'Registrar pago' : 'Registrar cobro', pageTitle: c.relatedDocLabel,
    contentHtml: `
      <div class="grid grid-4 mb-24">
        <div class="kpi"><div class="kpi-label">${c.direction==='OUT'?'Proveedor':'Cliente'}</div><div class="kpi-value" style="font-size:18px;">${ui.escape(c.counterpartyName)}</div></div>
        <div class="kpi"><div class="kpi-label">Total factura</div><div class="kpi-value" style="font-size:20px;">${currency.formatCompact(c.docTotal, c.docCurrency)}</div></div>
        <div class="kpi"><div class="kpi-label">Ya ${c.direction==='OUT'?'pagado':'cobrado'}</div><div class="kpi-value" style="font-size:20px;">${currency.formatCompact(c.docPaid, c.docCurrency)}</div></div>
        <div class="kpi"><div class="kpi-label">Pendiente</div><div class="kpi-value" style="color:var(--accent-ink);">${currency.formatCompact(c.docRemaining, c.docCurrency)}</div></div>
      </div>

      <div class="card mb-24">
        <div class="card-header"><div class="card-title">Datos del ${c.direction==='OUT'?'pago':'cobro'}</div></div>
        <div class="form-grid form-grid-2">
          <div class="field">
            <label class="field-label">Monto *</label>
            <input class="input" type="number" step="0.01" id="amount" value="${c.amount}" onchange="updateAmount(this.value)" oninput="updateAmount(this.value)">
          </div>
          <div class="field">
            <label class="field-label">Moneda del ${c.direction==='OUT'?'pago':'cobro'} *</label>
            <select class="select" onchange="updateCurrency(this.value)">
              <option value="${c.docCurrency}" ${c.currency===c.docCurrency?'selected':''}>${c.docCurrency} (misma de la factura)</option>
              ${['VES','USD','EUR'].filter(cc => cc !== c.docCurrency).map(cc => `<option value="${cc}" ${c.currency===cc?'selected':''}>${cc}</option>`).join('')}
            </select>
            <div class="field-hint">Si pagaste/cobraste en moneda distinta a la factura, vas a poder elegir tasa de conversión abajo.</div>
          </div>
          <div class="field">
            <label class="field-label">Fecha *</label>
            <input class="input" type="date" value="${c.date}" onchange="creating.date=this.value">
          </div>
          <div class="field">
            <label class="field-label">Método de pago *</label>
            <select class="select" onchange="updateMethod(this.value)">
              <option value="">— Selecciona —</option>
              ${methods.map(m => `<option value="${m.id}" ${m.id===c.paymentMethodId?'selected':''}>${ui.escape(m.name)}</option>`).join('')}
            </select>
          </div>
          ${selectedMethod && selectedMethod.requiresBank ? `
            <div class="field">
              <label class="field-label">Cuenta bancaria *</label>
              <select class="select" onchange="creating.bankAccountId=this.value">
                <option value="">— Selecciona —</option>
                ${visibleAccounts.length ? visibleAccounts.map(a => `<option value="${a.id}" ${a.id===c.bankAccountId?'selected':''}>${ui.escape(a.name)} · ${a.currency} · saldo ${currency.format(a.balance, a.currency)}${a.countsForFiscal===false?' · 👤 Personal':''}</option>`).join('') : `<option value="" disabled>Sin cuentas</option>`}
              </select>
              <div class="field-hint">Podés elegir cualquier cuenta. Si la moneda difiere de la del pago, se hará conversión.</div>
            </div>
          ` : '<div></div>'}
          ${selectedMethod && selectedMethod.requiresReference ? `
            <div class="field">
              <label class="field-label">Referencia *</label>
              <input class="input" value="${ui.escape(c.reference||'')}" onchange="creating.reference=this.value" placeholder="N° comprobante, hash, etc">
            </div>
          ` : `
            <div class="field">
              <label class="field-label">Referencia</label>
              <input class="input" value="${ui.escape(c.reference||'')}" onchange="creating.reference=this.value">
            </div>
          `}
          <div class="field" style="grid-column:1/-1;">
            <label class="field-label">Notas</label>
            <textarea class="textarea" onchange="creating.notes=this.value">${ui.escape(c.notes||'')}</textarea>
          </div>
        </div>
      </div>

      ${conversionPanelHtml}

      <div class="card mb-24" style="background:var(--surface-2);padding:16px;">
        <div style="font-size:12px;color:var(--ink-3);font-weight:600;">Resumen al registrar:</div>
        <ul style="margin:8px 0 0 20px;font-size:13px;color:var(--ink-2);line-height:1.8;">
          <li>Se aplicará <strong>${currency.format(c.amountInDocCurrency, c.docCurrency)}</strong> a la factura ${c.relatedDocCode}</li>
          ${c.bankAccountId ? `<li>${c.direction==='OUT'?'Saldrá':'Entrará'} ${currency.format(c.amount, c.currency)} de la cuenta seleccionada</li>` : ''}
          <li>Pendiente después: <strong>${currency.format(Math.max(0, c.docRemaining - c.amountInDocCurrency), c.docCurrency)}</strong></li>
          ${(c.docRemaining - c.amountInDocCurrency) <= 0.01 ? `<li style="color:var(--success);">✓ La factura quedará <strong>pagada al 100%</strong>. Tasa congelada: ${(c.rateAtPayment||0).toLocaleString('es-VE',{maximumFractionDigits:4})} BCV</li>` : ''}
        </ul>
      </div>

      <!-- Botones abajo -->
      <div style="display:flex;justify-content:space-between;gap:8px;padding:24px 0;border-top:1px solid var(--border);margin-top:24px;">
        <button class="btn btn-secondary" onclick="cancelCreate()">← Cancelar</button>
        <button class="btn btn-primary" onclick="savePayment()">${ui.icon('check')} ${c.direction==='OUT'?'Registrar pago':'Registrar cobro'}</button>
      </div>
      <div style="height:40px;"></div>
    `
  });
}

function updateAmount(val) {
  creating.amount = parseFloat(val) || 0;
  render();
}

function updateCurrency(ccy) {
  const c = creating;
  const oldCcy = c.currency;
  c.currency = ccy;

  // ¿Cambió la moneda? Convertir el monto automáticamente para que sea coherente
  if (oldCcy !== ccy) {
    const oldAmount = parseFloat(c.amount) || 0;

    if (oldAmount > 0) {
      // Convertir el monto viejo a la nueva moneda
      let newAmount = oldAmount;

      if (oldCcy === ccy) {
        // No hace falta convertir
      } else {
        // Pasar a VES como pivote, después a la moneda destino
        let amountInVES = 0;
        if (oldCcy === 'VES') amountInVES = oldAmount;
        else if (oldCcy === 'USD') {
          const r = currency.getRate('BCV_USD');
          amountInVES = r?.value ? oldAmount * r.value : 0;
        } else if (oldCcy === 'EUR') {
          const r = currency.getRate('BCV_EUR');
          amountInVES = r?.value ? oldAmount * r.value : 0;
        }

        if (ccy === 'VES') newAmount = amountInVES;
        else if (ccy === 'USD') {
          const r = currency.getRate('BCV_USD');
          newAmount = r?.value ? amountInVES / r.value : 0;
        } else if (ccy === 'EUR') {
          const r = currency.getRate('BCV_EUR');
          newAmount = r?.value ? amountInVES / r.value : 0;
        }
      }

      c.amount = Math.round(newAmount * 100) / 100;
    }

    // Si ahora es conversión cruzada y no había una tasa elegida, asignar BCV por defecto
    const isCrossNow = c.currency !== c.docCurrency;
    if (isCrossNow) {
      // Elegir la tasa BCV apropiada según las monedas involucradas
      let defaultRateType = null;
      if ((c.currency === 'USD' && c.docCurrency === 'VES') ||
          (c.currency === 'VES' && c.docCurrency === 'USD')) {
        defaultRateType = 'BCV_USD';
      } else if ((c.currency === 'EUR' && c.docCurrency === 'VES') ||
                 (c.currency === 'VES' && c.docCurrency === 'EUR')) {
        defaultRateType = 'BCV_EUR';
      }
      if (defaultRateType) {
        const rate = currency.getRate(defaultRateType);
        if (rate?.value) {
          c.conversionRateType = defaultRateType;
          c.conversionRate = rate.value;
          c.conversionRateLabel = rate.label || defaultRateType;
          c.useCustomRate = false;
          // Para SENIAT
          if (defaultRateType === 'BCV_USD') {
            c.rateAtPayment = rate.value;
            c.rateTypeAtPayment = 'BCV_USD';
          }
        }
      }
    }
  }

  render();
}

function updateMethod(mid) {
  creating.paymentMethodId = mid;
  const m = db.getById(db.COLLECTIONS.paymentMethods, mid);
  creating.paymentMethodName = m?.name || '';
  if (m && !m.requiresBank) creating.bankAccountId = '';
  render();
}

/** ¿Esta tasa aplica para convertir entre estas dos monedas? */
function isRateApplicable(rateType, paymentCcy, docCcy) {
  // BCV_USD y BINANCE → involucra USD y VES
  if (rateType === 'BCV_USD' || rateType === 'BINANCE') {
    return (paymentCcy === 'USD' && docCcy === 'VES') ||
           (paymentCcy === 'VES' && docCcy === 'USD');
  }
  // BCV_EUR y P2P_EUR → involucra EUR y VES
  if (rateType === 'BCV_EUR' || rateType === 'P2P_EUR') {
    return (paymentCcy === 'EUR' && docCcy === 'VES') ||
           (paymentCcy === 'VES' && docCcy === 'EUR');
  }
  return false;
}

function selectConversionRate(rateType, value) {
  creating.conversionRateType = rateType;
  creating.conversionRate = parseFloat(value) || 0;
  creating.conversionRateLabel = currency.getRate(rateType)?.label || rateType;
  creating.useCustomRate = false;
  // Para tasa USD-VES, esta también es la rateAtPayment (relevante para SENIAT)
  if (rateType === 'BCV_USD') {
    creating.rateAtPayment = creating.conversionRate;
    creating.rateTypeAtPayment = 'BCV_USD';
  }
  render();
}

function useCustomRate() {
  creating.useCustomRate = true;
  creating.conversionRateType = 'CUSTOM';
  creating.conversionRateLabel = 'Personalizada';
  render();
}

function updateCustomRate(val) {
  creating.conversionRate = parseFloat(val) || 0;
  // Si la conversión es USD↔VES y se usó tasa custom, también es la rateAtPayment
  if ((creating.currency === 'USD' && creating.docCurrency === 'VES') ||
      (creating.currency === 'VES' && creating.docCurrency === 'USD')) {
    creating.rateAtPayment = creating.conversionRate;
    creating.rateTypeAtPayment = 'CUSTOM';
  }
  render();
}

function cancelCreate() { creating = null; render(); }

function savePayment() {
  const c = creating;

  // CRITICAL: leer el monto directamente del input por si el usuario no salió del campo (onchange no se disparó)
  const amountInput = document.getElementById('amount');
  if (amountInput) {
    const inputVal = parseFloat(amountInput.value) || 0;
    if (Math.abs(inputVal - c.amount) > 0.001) {
      c.amount = inputVal;
      // Recalcular amountInDocCurrency
      if (c.currency === c.docCurrency) {
        c.amountInDocCurrency = inputVal;
      } else {
        const rate = currency.getActiveRate();
        if (rate && rate.value) {
          if (c.docCurrency === 'VES' && c.currency !== 'VES') c.amountInDocCurrency = Math.round(inputVal * rate.value * 100) / 100;
          else if (c.docCurrency !== 'VES' && c.currency === 'VES') c.amountInDocCurrency = Math.round((inputVal / rate.value) * 100) / 100;
          else c.amountInDocCurrency = inputVal;
        }
      }
    }
  }

  if (!c.amount || c.amount <= 0) { ui.toast('Monto inválido', 'error'); return; }
  if (!c.paymentMethodId) { ui.toast('Selecciona un método de pago', 'error'); return; }
  const m = db.getById(db.COLLECTIONS.paymentMethods, c.paymentMethodId);
  if (m.requiresBank && !c.bankAccountId) { ui.toast('Selecciona una cuenta bancaria', 'error'); return; }
  if (m.requiresReference && !c.reference) { ui.toast('La referencia es obligatoria para este método', 'error'); return; }

  // Validar saldo si pago saliente
  if (c.direction === 'OUT' && c.bankAccountId) {
    const a = db.getById(db.COLLECTIONS.bankAccounts, c.bankAccountId);
    if (a.balance < c.amount) {
      if (!confirm(`La cuenta tiene ${currency.format(a.balance, a.currency)} pero el pago es de ${currency.format(c.amount, c.currency)}. ¿Continuar de todos modos? (saldo quedaría negativo)`)) return;
    }
  }

  // Validar que no exceda lo pendiente
  if (c.amountInDocCurrency > c.docRemaining + 0.01) {
    if (!confirm(`El monto excede lo pendiente (${currency.format(c.docRemaining, c.docCurrency)}). ¿Continuar?`)) return;
  }

  // Aviso si la cuenta es PERSONAL (no entra en libros fiscales)
  if (c.bankAccountId) {
    const acc = db.getById(db.COLLECTIONS.bankAccounts, c.bankAccountId);
    if (acc && acc.countsForFiscal === false) {
      const docName = c.relatedDocCode || 'el documento';
      const action = c.direction === 'OUT' ? 'pago' : 'cobro';
      const ok = confirm(
        `⚠️ Cuenta personal\n\n` +
        `La cuenta "${acc.name}" está marcada como personal.\n\n` +
        `Este ${action} de ${currency.format(c.amount, c.currency)} para ${docName}:\n` +
        `✓ Se registrará y descontará/sumará al saldo de la cuenta\n` +
        `✗ NO aparecerá en los libros fiscales (Compras/Ventas SENIAT)\n\n` +
        `¿Continuar?`
      );
      if (!ok) return;
    }
  }

  try {
    payments.createPayment(c);
    ui.toast(`${c.direction==='OUT'?'Pago':'Cobro'} registrado · ${currency.format(c.amountInDocCurrency, c.docCurrency)} aplicado`, 'success');
    creating = null;
    render();
  } catch (err) {
    ui.toast(err.message, 'error');
  }
}

function recalcStatuses() {
  ui.confirm(
    '¿Recalcular el estado de todas las facturas según los pagos reales registrados? Útil si hay facturas marcadas como pagadas pero con saldo pendiente.',
    () => {
      const { salesFixed, purchasesFixed } = payments.recalcAllInvoiceStatuses();
      const total = salesFixed + purchasesFixed;
      if (total > 0) {
        ui.toast(`${total} factura(s) corregida(s): ${salesFixed} de venta, ${purchasesFixed} de compra`, 'success');
      } else {
        ui.toast('Todos los estados están correctos', 'success');
      }
      render();
    },
    { confirmLabel: 'Recalcular' }
  );
}

render();


// Exponer funciones a window (para que onclick="" del HTML pueda llamarlas)

// Sincronizar variables de estado del módulo con window
try { Object.defineProperty(window, 'tab', { get: () => tab, set: (val) => { tab = val; }, configurable: true }); } catch(e) {}
try { Object.defineProperty(window, 'creating', { get: () => creating, set: (val) => { creating = val; }, configurable: true }); } catch(e) {}

Object.assign(window, {
  render: typeof render !== 'undefined' ? render : undefined,
  renderList: typeof renderList !== 'undefined' ? renderList : undefined,
  changeTab: typeof changeTab !== 'undefined' ? changeTab : undefined,
  renderCXPTable: typeof renderCXPTable !== 'undefined' ? renderCXPTable : undefined,
  renderCXCTable: typeof renderCXCTable !== 'undefined' ? renderCXCTable : undefined,
  renderHistoryTable: typeof renderHistoryTable !== 'undefined' ? renderHistoryTable : undefined,
  newPaymentForInvoice: typeof newPaymentForInvoice !== 'undefined' ? newPaymentForInvoice : undefined,
  newPaymentForDoc: typeof newPaymentForDoc !== 'undefined' ? newPaymentForDoc : undefined,
  renderCreate: typeof renderCreate !== 'undefined' ? renderCreate : undefined,
  updateAmount: typeof updateAmount !== 'undefined' ? updateAmount : undefined,
  updateCurrency: typeof updateCurrency !== 'undefined' ? updateCurrency : undefined,
  updateMethod: typeof updateMethod !== 'undefined' ? updateMethod : undefined,
  isRateApplicable: typeof isRateApplicable !== 'undefined' ? isRateApplicable : undefined,
  selectConversionRate: typeof selectConversionRate !== 'undefined' ? selectConversionRate : undefined,
  useCustomRate: typeof useCustomRate !== 'undefined' ? useCustomRate : undefined,
  updateCustomRate: typeof updateCustomRate !== 'undefined' ? updateCustomRate : undefined,
  cancelCreate: typeof cancelCreate !== 'undefined' ? cancelCreate : undefined,
  savePayment: typeof savePayment !== 'undefined' ? savePayment : undefined,
  recalcStatuses: typeof recalcStatuses !== 'undefined' ? recalcStatuses : undefined,
});
});
</script>
