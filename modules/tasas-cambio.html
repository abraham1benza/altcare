<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasas de Cambio · altcare</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/tax.js"></script>
<script src="../assets/js/ui.js"></script>
<script>
if (!auth.guard('tasas-cambio')) throw new Error('blocked');

function render() {
  const rates = currency.getRates();

  const cards = rates.map(r => {
    const isActive = r.active;
    return `
      <div class="card" style="${isActive ? 'border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
          <div>
            <div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;">${r.type.replace('_',' ')}</div>
            <div class="card-title" style="margin-top:4px;">${r.label}</div>
          </div>
          ${isActive ? '<span class="badge badge-accent">Activa</span>' : ''}
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-family:var(--font-display);font-size:36px;font-weight:400;letter-spacing:-0.03em;line-height:1;">
            ${r.value > 0 ? r.value.toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:4}) : '—'}
            <span style="font-size:14px;color:var(--ink-3);font-family:var(--font-ui);">Bs / ${r.symbol}</span>
          </div>
          <div class="text-muted" style="font-size:12px;margin-top:6px;">Actualizada ${ui.formatDate(r.updatedDate)}</div>
        </div>

        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary btn-sm" onclick="editRate('${r.type}')">${ui.icon('edit')} Actualizar</button>
          ${!isActive ? `<button class="btn btn-primary btn-sm" onclick="activate('${r.type}')">${ui.icon('check')} Activar</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const converterHtml = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Convertidor rápido</div>
      </div>
      <div class="form-grid form-grid-3">
        <div class="field">
          <label class="field-label">Monto</label>
          <input class="input" type="number" step="0.01" id="conv-amount" value="100" oninput="convert()">
        </div>
        <div class="field">
          <label class="field-label">Desde</label>
          <select class="select" id="conv-from" onchange="convert()">
            <option value="VES">Bolívares (VES)</option>
            <option value="USD">Dólares (USD)</option>
            <option value="EUR">Euros (EUR)</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Tasa</label>
          <select class="select" id="conv-rate" onchange="convert()">
            ${currency.getRates().map(r => `<option value="${r.type}" ${r.active?'selected':''}>${r.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="conv-result" style="margin-top:20px;padding:20px;background:var(--surface-2);border-radius:var(--r-md);"></div>
    </div>
  `;

  const content = `
    <div class="action-bar">
      <div class="action-bar-left">
        <h2 class="action-bar-title">Multi-moneda</h2>
        <span class="action-bar-count">${rates.length} tasas configuradas</span>
      </div>
    </div>

    <p class="text-muted mb-24" style="max-width:680px;">
      Cada transacción del sistema se guardará con el valor en bolívares y en moneda extranjera, congelando la tasa usada en ese momento. Esto garantiza que los reportes históricos no cambien aunque las tasas se muevan después.
    </p>

    <div class="grid grid-2 mb-24">${cards}</div>

    ${converterHtml}
  `;

  ui.renderLayout({
    activeModule: 'tasas-cambio',
    pageEyebrow: 'Operaciones',
    pageTitle: 'Tasas de Cambio',
    contentHtml: content
  });

  setTimeout(convert, 50);
}

function editRate(type) {
  const r = currency.getRate(type);
  ui.openModal({
    title: 'Actualizar ' + r.label,
    subtitle: 'Ingresa el valor en bolívares por cada ' + r.symbol + '1',
    body: `
      <form id="rate-form" onsubmit="saveRate(event, '${type}')">
        <div class="field">
          <label class="field-label">Valor (Bs por ${r.symbol}1)</label>
          <input class="input" type="number" step="0.0001" name="value" value="${r.value || ''}" autofocus required>
          <div class="field-hint">Por ejemplo: si el BCV publica 1$ = 50,25 Bs, escribe 50.25</div>
        </div>
        <div class="checkbox-row" style="margin-top:16px;">
          <input type="checkbox" id="set-active" ${r.active?'checked':''}>
          <label for="set-active" style="font-size:13px;">Marcar como tasa activa por defecto</label>
        </div>
      </form>
    `,
    footer: `
      <button class="btn btn-secondary" onclick="ui.closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="document.getElementById('rate-form').requestSubmit()">Guardar</button>
    `
  });
}

function saveRate(e, type) {
  e.preventDefault();
  const form = e.target;
  const value = parseFloat(form.value.value) || 0;
  const setActive = document.getElementById('set-active').checked;
  if (value <= 0) { ui.toast('El valor debe ser mayor a cero', 'error'); return; }
  currency.updateRate(type, value);
  if (setActive) currency.setActiveRate(type);
  ui.closeModal();
  ui.toast('Tasa actualizada', 'success');
  render();
}

function activate(type) {
  currency.setActiveRate(type);
  ui.toast('Tasa activa cambiada', 'success');
  render();
}

function convert() {
  const amount = parseFloat(document.getElementById('conv-amount').value) || 0;
  const from = document.getElementById('conv-from').value;
  const rateType = document.getElementById('conv-rate').value;
  const r = currency.getRate(rateType);
  const result = document.getElementById('conv-result');

  if (!r || !r.value) {
    result.innerHTML = '<span class="text-muted">Esta tasa aún no tiene valor. Actualízala primero.</span>';
    return;
  }

  const c = currency.convert(amount, from, rateType);
  const foreignSym = r.symbol;

  result.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:24px;align-items:center;">
      <div>
        <div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:6px;">${from}</div>
        <div style="font-family:var(--font-display);font-size:28px;letter-spacing:-0.02em;">
          ${(from === 'VES' ? c.ves : c.foreign).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:4})}
          <span style="font-size:13px;color:var(--ink-3);font-family:var(--font-ui);">${from === 'VES' ? 'Bs' : foreignSym}</span>
        </div>
      </div>
      <div style="color:var(--ink-3);font-size:20px;">→</div>
      <div>
        <div style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:6px;">${from === 'VES' ? r.type.split('_')[1] || 'USD' : 'VES'}</div>
        <div style="font-family:var(--font-display);font-size:28px;letter-spacing:-0.02em;color:var(--accent-ink);">
          ${(from === 'VES' ? c.foreign : c.ves).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:4})}
          <span style="font-size:13px;color:var(--ink-3);font-family:var(--font-ui);">${from === 'VES' ? foreignSym : 'Bs'}</span>
        </div>
      </div>
    </div>
    <div class="text-muted" style="font-size:12px;margin-top:12px;text-align:center;">
      Tasa usada: <span class="text-mono">${r.value.toFixed(4)}</span> Bs / ${foreignSym}1 · ${r.label}
    </div>
  `;
}

render();
</script>
</body>
</html>
